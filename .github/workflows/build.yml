name: Build iOS Mod Menu

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install Dependencies (dpkg, ldid)
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew update || true
          brew install dpkg ldid xz || true

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
          echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git
          cp -R sdks/iPhoneOS* ~/theos/sdks/ || true

      - name: Create Tweak Files
        run: |
          cat << 'EOF' > control
          Package: com.few1n.dreamroadmod
          Name: FEW1N Mod Menu
          Depends: mobilesubstrate
          Version: 15.0
          Architecture: iphoneos-arm
          Description: FEW1N Premium Mod Menu v15
          Maintainer: few1n
          Author: few1n
          Section: Tweaks
          EOF

          cat << 'EOF' > Makefile
          TARGET := iphone:clang:latest:14.0
          ARCHS = arm64
          INSTALL_TARGET_PROCESSES = DreamRoadMultiplayer

          include ~/theos/makefiles/common.mk

          TWEAK_NAME = FEW1NMod

          FEW1NMod_FILES = Tweak.xm
          FEW1NMod_CFLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-error
          FEW1NMod_FRAMEWORKS = UIKit Foundation QuartzCore

          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF

          cat << 'EOF' > FEW1NMod.plist
          { Filter = { Bundles = ( "com.TenebryFox.DreamRoadMultiplayer" ); }; }
          EOF

          cat > Tweak.xm << 'TWEAKEOF'
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <QuartzCore/QuartzCore.h>
          #include <substrate.h>
          #include <mach-o/dyld.h>
          #include <string.h>
          #include <dlfcn.h>

          // ============================================================
          //  DOGRULANMIS RVA TABLOSU
          // ============================================================
          // Time.set_timeScale(float)                 -> 0x67523F8
          // Rigidbody.get_position()                  -> 0x6819010
          // Rigidbody.set_position(Vector3)            -> 0x6819124
          // Rigidbody.get_linearVelocity()            -> 0x6817D68
          // Rigidbody.set_linearVelocity(Vector3)     -> 0x6817E7C
          // Rigidbody.set_mass(float)                 -> 0x681869C
          // Component.get_transform()                 -> 0x673C9DC
          // Transform.set_localScale(Vector3)         -> 0x6757F98
          // RCCP_CarController.Update()               -> 0x59A77D8
          // PlateGenerators.Generate(string)          -> 0x5A12550
          // PlateGenerators.GenerateRussian()          -> 0x5A218F4
          // PlateGenerators.GenerateUS()               -> 0x5A22100
          // PlateGenerators.GenerateEU()               -> 0x5A22ADC
          // PlateTuner.get_plateText()                -> 0x5F85AEC
          // ChatManager.get_Instance()                -> 0x319D630
          // ChatManager.Send(string)                  -> 0x319D734
          // HR_UI_RoomListLine.Connect()              -> 0x5497790
          // HR_PhotonLobbyManager.EnterPassword()     -> 0x548C5CC
          // ============================================================

          struct Vector3 { float x, y, z; };

          // ===== STATE =====
          static int speedMode = 1;
          static bool isHoverEnabled = false;
          static float hoverHeight = 5.0f;
          static int sizeMode = 0;
          static bool isBulldozerEnabled = false;
          static bool isSavePosRequested = false;
          static bool isTeleportRequested = false;
          static struct Vector3 savedPosition = {0,0,0};
          static bool isCustomPlateEnabled = false;
          static char customPlateText[64] = "FEW1N";
          static bool isColorChatEnabled = false;
          static bool isSpamEnabled = false;
          static char chatSpamText[128] = "FEW1N MOD MENU!";
          static NSTimer *spamTimer = nil;
          static bool isBypassPasswordEnabled = true;

          // ===== IL2CPP HELPERS =====
          static void* (*cached_il2cpp_string_new)(const char*) = NULL;

          static uintptr_t GetBase() {
              for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                  const char *n = _dyld_get_image_name(i);
                  if (n && strstr(n, "UnityFramework"))
                      return _dyld_get_image_vmaddr_slide(i);
              }
              return 0;
          }

          static void* mkStr(NSString* s) {
              if (!cached_il2cpp_string_new)
                  cached_il2cpp_string_new = (void*(*)(const char*))dlsym(RTLD_DEFAULT, "il2cpp_string_new");
              return (cached_il2cpp_string_new && s) ? cached_il2cpp_string_new(s.UTF8String) : NULL;
          }

          static NSString* readStr(void* il2s) {
              if (!il2s) return @"";
              int32_t len = *(int32_t*)((uintptr_t)il2s + 0x10);
              if (len <= 0 || len > 4096) return @"";
              return [NSString stringWithCharacters:(unichar*)((uintptr_t)il2s + 0x14) length:len];
          }

          // ===== FUNCTION POINTERS =====
          static struct Vector3 (*rb_getPos)(void*,void*);
          static void (*rb_setPos)(void*,struct Vector3,void*);
          static struct Vector3 (*rb_getVel)(void*,void*);
          static void (*rb_setVel)(void*,struct Vector3,void*);
          static void (*rb_setMass)(void*,float,void*);
          static void* (*getTransform)(void*,void*);
          static void (*setScale)(void*,struct Vector3,void*);
          static void* (*chatGetInst)(void*);
          static void (*chatSend)(void*,void*,void*);

          // ===== HOOK 1: set_timeScale =====
          static void (*o_setTimeScale)(float,void*);
          static void h_setTimeScale(float v, void* m) {
              if (speedMode == 2)  v = 2.5f;
              else if (speedMode == 5)  v = 5.0f;
              else if (speedMode == 10) v = 10.0f;
              o_setTimeScale(v, m);
          }

          // ===== HOOK 2: RCCP Update =====
          static void (*o_rccp)(void*,void*);
          static void h_rccp(void* self, void* m) {
              o_rccp(self, m);
              @try {
                  if (!*(bool*)((uintptr_t)self + 0x108)) return;
                  void* rb = *(void**)((uintptr_t)self + 0x48);
                  if (!rb) return;

                  if (sizeMode != 0 && getTransform && setScale) {
                      void* tf = getTransform(self, NULL);
                      if (tf) {
                          struct Vector3 sc = (sizeMode==1) ?
                              (struct Vector3){10,10,10} : (struct Vector3){0.01f,0.01f,0.01f};
                          setScale(tf, sc, NULL);
                      }
                  }
                  if (isBulldozerEnabled && rb_setMass) rb_setMass(rb, 999999.0f, NULL);
                  if (isSavePosRequested && rb_getPos) {
                      savedPosition = rb_getPos(rb, NULL);
                      isSavePosRequested = false;
                  }
                  if (isTeleportRequested && rb_setPos && rb_setVel) {
                      rb_setPos(rb, savedPosition, NULL);
                      rb_setVel(rb, (struct Vector3){0,0,0}, NULL);
                      isTeleportRequested = false;
                  }
                  if (isHoverEnabled && rb_getPos && rb_setPos && rb_getVel && rb_setVel) {
                      struct Vector3 vel = rb_getVel(rb, NULL);
                      vel.y = 0; rb_setVel(rb, vel, NULL);
                      struct Vector3 pos = rb_getPos(rb, NULL);
                      pos.y = hoverHeight; rb_setPos(rb, pos, NULL);
                  }
              } @catch (...) {}
          }

          // ===== HOOK 3: Plate hooks (ALL static - no this) =====
          static void* (*o_plateGen)(void*,void*);
          static void* h_plateGen(void* country, void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_plateGen(country, m);
          }
          static void* (*o_genRU)(void*);
          static void* h_genRU(void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_genRU(m);
          }
          static void* (*o_genUS)(void*);
          static void* h_genUS(void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_genUS(m);
          }
          static void* (*o_genEU)(void*);
          static void* h_genEU(void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_genEU(m);
          }
          static void* (*o_plateText)(void*,void*);
          static void* h_plateText(void* self, void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_plateText(self, m);
          }

          // ===== HOOK 4: Chat =====
          static void (*o_chatSend)(void*,void*,void*);
          static void h_chatSend(void* self, void* msg, void* m) {
              if (isColorChatEnabled && msg) {
                  NSString *orig = readStr(msg);
                  if (orig.length > 0) {
                      void* colored = mkStr([NSString stringWithFormat:@"<color=cyan><b>[FEW1N]</b></color> %@", orig]);
                      if (colored) { o_chatSend(self, colored, m); return; }
                  }
              }
              o_chatSend(self, msg, m);
          }

          // ===== HOOK 5: Room Connect =====
          static void (*o_roomConnect)(void*,void*);
          static void h_roomConnect(void* self, void* m) {
              if (isBypassPasswordEnabled) {
                  void* empty = mkStr(@"");
                  if (empty) *(void**)((uintptr_t)self + 0x50) = empty;
              }
              o_roomConnect(self, m);
          }

          // ===== HOOK 6: EnterPassword =====
          static void (*o_enterPwd)(void*,void*);
          static void h_enterPwd(void* self, void* m) {
              if (isBypassPasswordEnabled) {
                  @try {
                      void* pwdInput = *(void**)((uintptr_t)self + 0x60);
                      if (pwdInput) {
                          void* empty = mkStr(@"");
                          if (empty) *(void**)((uintptr_t)pwdInput + 0xC8) = empty;
                      }
                  } @catch (...) {}
              }
              o_enterPwd(self, m);
          }

          // =============================================================
          //  PREMIUM MOD MENU UI
          // =============================================================

          #define C_BG     [UIColor colorWithRed:0.08 green:0.08 blue:0.12 alpha:0.97]
          #define C_CARD   [UIColor colorWithRed:0.12 green:0.12 blue:0.18 alpha:1.0]
          #define C_ON     [UIColor colorWithRed:0.0 green:0.85 blue:0.55 alpha:1.0]
          #define C_OFF    [UIColor colorWithRed:0.35 green:0.35 blue:0.42 alpha:1.0]
          #define C_RED    [UIColor colorWithRed:1.0 green:0.25 blue:0.35 alpha:1.0]
          #define C_ACCENT [UIColor colorWithRed:0.40 green:0.30 blue:1.0 alpha:1.0]
          #define C_GOLD   [UIColor colorWithRed:1.0 green:0.75 blue:0.20 alpha:1.0]
          #define C_CYAN   [UIColor colorWithRed:0.0 green:0.85 blue:0.95 alpha:1.0]
          #define C_TEXT   [UIColor colorWithWhite:0.95 alpha:1.0]
          #define C_SUB    [UIColor colorWithWhite:0.55 alpha:1.0]

          @interface FEW1NMenu : NSObject
          @property (nonatomic, strong) UIButton *fab;
          @property (nonatomic, strong) UIView *panel;
          @property (nonatomic, strong) UIScrollView *scrollView;
          @property (nonatomic, strong) UIView *contentView;
          @property (nonatomic, strong) NSMutableDictionary *toggleViews;
          @property (nonatomic, strong) NSMutableDictionary *speedBtns;
          @property (nonatomic, strong) UILabel *hoverLabel;
          @property (nonatomic, strong) UIButton *plateBtn;
          + (instancetype)shared;
          - (void)build;
          @end

          @implementation FEW1NMenu

          + (instancetype)shared {
              static FEW1NMenu *i; static dispatch_once_t t;
              dispatch_once(&t, ^{ i = [[self alloc] init]; });
              return i;
          }

          - (void)build {
              UIWindow *w = [UIApplication sharedApplication].keyWindow;
              if (!w) return;
              self.toggleViews = [NSMutableDictionary new];
              self.speedBtns = [NSMutableDictionary new];

              // ===== FLOATING ACTION BUTTON =====
              self.fab = [UIButton buttonWithType:UIButtonTypeCustom];
              self.fab.frame = CGRectMake(16, 100, 56, 56);
              self.fab.layer.cornerRadius = 28;
              self.fab.clipsToBounds = NO;

              CAGradientLayer *fabGrad = [CAGradientLayer layer];
              fabGrad.frame = self.fab.bounds;
              fabGrad.cornerRadius = 28;
              fabGrad.colors = @[(id)[UIColor colorWithRed:0.9 green:0.2 blue:0.3 alpha:1].CGColor,
                                 (id)[UIColor colorWithRed:0.6 green:0.1 blue:0.8 alpha:1].CGColor];
              fabGrad.startPoint = CGPointMake(0,0); fabGrad.endPoint = CGPointMake(1,1);
              [self.fab.layer insertSublayer:fabGrad atIndex:0];

              self.fab.layer.shadowColor = [UIColor colorWithRed:0.9 green:0.2 blue:0.3 alpha:0.6].CGColor;
              self.fab.layer.shadowOffset = CGSizeMake(0, 4);
              self.fab.layer.shadowRadius = 12; self.fab.layer.shadowOpacity = 1.0;

              UILabel *fabLbl = [[UILabel alloc] initWithFrame:self.fab.bounds];
              fabLbl.text = @"F1"; fabLbl.textColor = [UIColor whiteColor];
              fabLbl.textAlignment = NSTextAlignmentCenter;
              fabLbl.font = [UIFont systemFontOfSize:20 weight:UIFontWeightBlack];
              [self.fab addSubview:fabLbl];

              [self.fab addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              UIPanGestureRecognizer *pg1 = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(drag:)];
              [self.fab addGestureRecognizer:pg1];
              [w addSubview:self.fab];

              // Pulse animation
              [UIView animateWithDuration:1.5 delay:0 options:UIViewAnimationOptionRepeat|UIViewAnimationOptionAutoreverse|UIViewAnimationOptionAllowUserInteraction animations:^{
                  self.fab.transform = CGAffineTransformMakeScale(1.08, 1.08);
              } completion:nil];

              // ===== MAIN PANEL =====
              CGFloat pw = 310, ph = 560;
              self.panel = [[UIView alloc] initWithFrame:CGRectMake((w.bounds.size.width-pw)/2, (w.bounds.size.height-ph)/2, pw, ph)];
              self.panel.backgroundColor = C_BG;
              self.panel.layer.cornerRadius = 24;
              self.panel.layer.borderWidth = 1;
              self.panel.layer.borderColor = [UIColor colorWithWhite:0.25 alpha:0.5].CGColor;
              self.panel.layer.shadowColor = [UIColor blackColor].CGColor;
              self.panel.layer.shadowOffset = CGSizeMake(0,10);
              self.panel.layer.shadowRadius = 30; self.panel.layer.shadowOpacity = 0.7;
              self.panel.clipsToBounds = YES;
              self.panel.hidden = YES;
              self.panel.alpha = 0;
              self.panel.transform = CGAffineTransformMakeScale(0.85, 0.85);

              UIPanGestureRecognizer *pg2 = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(drag:)];
              [self.panel addGestureRecognizer:pg2];

              // ===== HEADER =====
              UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, pw, 60)];
              CAGradientLayer *hGrad = [CAGradientLayer layer];
              hGrad.frame = header.bounds;
              hGrad.colors = @[(id)[UIColor colorWithRed:0.9 green:0.15 blue:0.25 alpha:1].CGColor,
                               (id)[UIColor colorWithRed:0.55 green:0.1 blue:0.75 alpha:1].CGColor];
              hGrad.startPoint = CGPointMake(0,0.5); hGrad.endPoint = CGPointMake(1,0.5);
              [header.layer addSublayer:hGrad];

              UILabel *titleLbl = [[UILabel alloc] initWithFrame:CGRectMake(16, 15, pw-80, 30)];
              titleLbl.text = @"FEW1N MOD MENÜ";
              titleLbl.textColor = [UIColor whiteColor];
              titleLbl.font = [UIFont systemFontOfSize:20 weight:UIFontWeightBlack];
              [header addSubview:titleLbl];

              UILabel *verLbl = [[UILabel alloc] initWithFrame:CGRectMake(16, 38, pw-80, 16)];
              verLbl.text = @"v15.0 • Premium Edition";
              verLbl.textColor = [UIColor colorWithWhite:1 alpha:0.6];
              verLbl.font = [UIFont systemFontOfSize:10 weight:UIFontWeightMedium];
              [header addSubview:verLbl];

              UIButton *closeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              closeBtn.frame = CGRectMake(pw-50, 10, 40, 40);
              [closeBtn setTitle:@"✕" forState:UIControlStateNormal];
              [closeBtn setTitleColor:[UIColor colorWithWhite:1 alpha:0.8] forState:UIControlStateNormal];
              closeBtn.titleLabel.font = [UIFont systemFontOfSize:22 weight:UIFontWeightLight];
              [closeBtn addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [header addSubview:closeBtn];
              [self.panel addSubview:header];

              // ===== SCROLL VIEW =====
              self.scrollView = [[UIScrollView alloc] initWithFrame:CGRectMake(0, 60, pw, ph-60)];
              self.scrollView.showsVerticalScrollIndicator = NO;
              [self.panel addSubview:self.scrollView];

              self.contentView = [[UIView alloc] initWithFrame:CGRectMake(0, 0, pw, 0)];
              [self.scrollView addSubview:self.contentView];

              CGFloat y = 12;

              // ======= SECTION: HIZ =======
              y = [self addSectionHeader:@"⚡  HIZ KONTROLÜ" atY:y];

              UIView *speedRow = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 44)];
              speedRow.backgroundColor = C_CARD;
              speedRow.layer.cornerRadius = 12;
              NSArray *speeds = @[@"1x", @"2.5x", @"5x", @"10x"];
              NSArray *speedVals = @[@1, @2, @5, @10];
              CGFloat bw = (pw-24-10*3-16)/4;
              for (int i = 0; i < 4; i++) {
                  UIButton *sb = [UIButton buttonWithType:UIButtonTypeSystem];
                  sb.frame = CGRectMake(8 + i*(bw+10), 6, bw, 32);
                  sb.layer.cornerRadius = 10;
                  [sb setTitle:speeds[i] forState:UIControlStateNormal];
                  sb.titleLabel.font = [UIFont systemFontOfSize:13 weight:UIFontWeightBold];
                  sb.tag = [speedVals[i] intValue];
                  [sb addTarget:self action:@selector(speedTap:) forControlEvents:UIControlEventTouchUpInside];
                  [speedRow addSubview:sb];
                  self.speedBtns[speedVals[i]] = sb;
              }
              [self.contentView addSubview:speedRow];
              y += 56;

              // ======= SECTION: ARAC =======
              y = [self addSectionHeader:@"🏎  ARAÇ HİLELERİ" atY:y];

              y = [self addToggleCard:@"🦖  Godzilla Modu"   sub:@"Aracı 10x büyüt"        key:@"godzilla"  atY:y action:@selector(tapGodzilla)];
              y = [self addToggleCard:@"👻  Hayalet Modu"     sub:@"Aracı mini yap"          key:@"ghost"     atY:y action:@selector(tapGhost)];
              y = [self addToggleCard:@"🔨  Buldozer"         sub:@"999999 kg kütle"          key:@"bulldozer" atY:y action:@selector(tapBulldozer)];
              y = [self addToggleCard:@"🚁  Hover"            sub:@"Havada asılı kal"         key:@"hover"     atY:y action:@selector(tapHover)];

              // Hover height
              UIView *hoverCard = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 44)];
              hoverCard.backgroundColor = C_CARD; hoverCard.layer.cornerRadius = 12;

              self.hoverLabel = [[UILabel alloc] initWithFrame:CGRectMake(16, 0, 120, 44)];
              self.hoverLabel.text = @"Yükseklik: 5m";
              self.hoverLabel.textColor = C_TEXT; self.hoverLabel.font = [UIFont systemFontOfSize:13 weight:UIFontWeightMedium];
              [hoverCard addSubview:self.hoverLabel];

              UIButton *hUp = [self mkSmallBtn:@"▲" frame:CGRectMake(pw-24-100, 7, 44, 30) action:@selector(hUp)];
              UIButton *hDn = [self mkSmallBtn:@"▼" frame:CGRectMake(pw-24-50, 7, 44, 30) action:@selector(hDn)];
              [hoverCard addSubview:hUp]; [hoverCard addSubview:hDn];
              [self.contentView addSubview:hoverCard];
              y += 52;

              // ======= SECTION: KONUM =======
              y = [self addSectionHeader:@"📍  KONUM" atY:y];

              UIView *posRow = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 48)];
              UIButton *saveBtn = [self mkActionBtn:@"💾  Kaydet" frame:CGRectMake(0, 0, (pw-24-8)/2, 48) color:C_ACCENT action:@selector(savePos)];
              UIButton *tpBtn   = [self mkActionBtn:@"⚡  Işınlan" frame:CGRectMake((pw-24+8)/2, 0, (pw-24-8)/2, 48) color:C_RED action:@selector(tpPos)];
              [posRow addSubview:saveBtn]; [posRow addSubview:tpBtn];
              [self.contentView addSubview:posRow];
              y += 60;

              // ======= SECTION: CHAT =======
              y = [self addSectionHeader:@"💬  CHAT" atY:y];

              y = [self addToggleCard:@"🎨  Renkli Chat"  sub:@"[FEW1N] prefix + renk"  key:@"colorchat"  atY:y action:@selector(tapColorChat)];
              y = [self addToggleCard:@"📢  Chat Spam"    sub:@"0.1s aralıkla mesaj"     key:@"chatspam"   atY:y action:@selector(tapChatSpam)];

              UIView *spamRow = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 44)];
              spamRow.backgroundColor = C_CARD; spamRow.layer.cornerRadius = 12;
              UIButton *editSpam = [UIButton buttonWithType:UIButtonTypeSystem];
              editSpam.frame = CGRectMake(0, 0, pw-24, 44);
              [editSpam setTitle:@"✏️  Spam Yazısını Düzenle" forState:UIControlStateNormal];
              [editSpam setTitleColor:C_CYAN forState:UIControlStateNormal];
              editSpam.titleLabel.font = [UIFont systemFontOfSize:13 weight:UIFontWeightSemibold];
              [editSpam addTarget:self action:@selector(editSpam) forControlEvents:UIControlEventTouchUpInside];
              [spamRow addSubview:editSpam];
              [self.contentView addSubview:spamRow];
              y += 52;

              // ======= SECTION: PLAKA =======
              y = [self addSectionHeader:@"🔢  PLAKA" atY:y];

              UIView *plateCard = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 48)];
              plateCard.backgroundColor = C_CARD; plateCard.layer.cornerRadius = 12;
              self.plateBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              self.plateBtn.frame = CGRectMake(0, 0, pw-24, 48);
              [self.plateBtn setTitle:@"📝  Özel Plaka Ayarla" forState:UIControlStateNormal];
              [self.plateBtn setTitleColor:C_GOLD forState:UIControlStateNormal];
              self.plateBtn.titleLabel.font = [UIFont systemFontOfSize:14 weight:UIFontWeightBold];
              [self.plateBtn addTarget:self action:@selector(editPlate) forControlEvents:UIControlEventTouchUpInside];
              [plateCard addSubview:self.plateBtn];
              [self.contentView addSubview:plateCard];
              y += 60;

              // ======= SECTION: ODA =======
              y = [self addSectionHeader:@"🔑  ODA" atY:y];

              y = [self addToggleCard:@"🔓  Şifre Kırıcı"  sub:@"Şifreli odalara gir"  key:@"bypass"  atY:y action:@selector(tapBypass)];

              // ===== FOOTER =====
              UILabel *foot = [[UILabel alloc] initWithFrame:CGRectMake(0, y+8, pw, 24)];
              foot.text = @"made by few1n 🖤";
              foot.textColor = [UIColor colorWithWhite:0.3 alpha:1]; foot.textAlignment = NSTextAlignmentCenter;
              foot.font = [UIFont systemFontOfSize:10 weight:UIFontWeightMedium];
              [self.contentView addSubview:foot];
              y += 40;

              self.contentView.frame = CGRectMake(0, 0, pw, y);
              self.scrollView.contentSize = CGSizeMake(pw, y);

              [w addSubview:self.panel];
              [self refreshUI];
          }

          // ===== UI HELPERS =====
          - (CGFloat)addSectionHeader:(NSString*)text atY:(CGFloat)y {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(20, y, 270, 20)];
              l.text = text; l.textColor = C_SUB;
              l.font = [UIFont systemFontOfSize:11 weight:UIFontWeightBlack];
              [self.contentView addSubview:l];
              return y + 26;
          }

          - (CGFloat)addToggleCard:(NSString*)title sub:(NSString*)sub key:(NSString*)key atY:(CGFloat)y action:(SEL)action {
              CGFloat pw = self.panel.bounds.size.width;
              UIView *card = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 56)];
              card.backgroundColor = C_CARD; card.layer.cornerRadius = 12;

              UILabel *tl = [[UILabel alloc] initWithFrame:CGRectMake(16, 8, pw-100, 22)];
              tl.text = title; tl.textColor = C_TEXT;
              tl.font = [UIFont systemFontOfSize:14 weight:UIFontWeightSemibold];
              [card addSubview:tl];

              UILabel *sl = [[UILabel alloc] initWithFrame:CGRectMake(16, 30, pw-100, 16)];
              sl.text = sub; sl.textColor = C_SUB;
              sl.font = [UIFont systemFontOfSize:10 weight:UIFontWeightMedium];
              [card addSubview:sl];

              // Custom toggle pill
              UIView *pill = [[UIView alloc] initWithFrame:CGRectMake(pw-24-64, 16, 48, 26)];
              pill.backgroundColor = C_OFF; pill.layer.cornerRadius = 13;
              pill.tag = 100;

              UIView *dot = [[UIView alloc] initWithFrame:CGRectMake(3, 3, 20, 20)];
              dot.backgroundColor = [UIColor whiteColor]; dot.layer.cornerRadius = 10;
              dot.tag = 101;
              [pill addSubview:dot];
              [card addSubview:pill];

              UIButton *tapBtn = [UIButton buttonWithType:UIButtonTypeCustom];
              tapBtn.frame = card.bounds;
              [tapBtn addTarget:self action:action forControlEvents:UIControlEventTouchUpInside];
              [card addSubview:tapBtn];

              [self.contentView addSubview:card];
              self.toggleViews[key] = pill;
              return y + 64;
          }

          - (UIButton*)mkSmallBtn:(NSString*)t frame:(CGRect)f action:(SEL)a {
              UIButton *b = [UIButton buttonWithType:UIButtonTypeSystem]; b.frame = f;
              [b setTitle:t forState:UIControlStateNormal];
              [b setTitleColor:C_TEXT forState:UIControlStateNormal];
              b.backgroundColor = [UIColor colorWithWhite:0.2 alpha:1]; b.layer.cornerRadius = 8;
              b.titleLabel.font = [UIFont systemFontOfSize:16 weight:UIFontWeightBold];
              [b addTarget:self action:a forControlEvents:UIControlEventTouchUpInside];
              return b;
          }

          - (UIButton*)mkActionBtn:(NSString*)t frame:(CGRect)f color:(UIColor*)c action:(SEL)a {
              UIButton *b = [UIButton buttonWithType:UIButtonTypeSystem]; b.frame = f;
              [b setTitle:t forState:UIControlStateNormal];
              [b setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              b.backgroundColor = c; b.layer.cornerRadius = 12;
              b.titleLabel.font = [UIFont systemFontOfSize:14 weight:UIFontWeightBold];
              [b addTarget:self action:a forControlEvents:UIControlEventTouchUpInside];
              return b;
          }

          - (void)setToggle:(NSString*)key on:(BOOL)on {
              UIView *pill = self.toggleViews[key];
              if (!pill) return;
              UIView *dot = [pill viewWithTag:101];
              [UIView animateWithDuration:0.25 delay:0 usingSpringWithDamping:0.7 initialSpringVelocity:0.5 options:0 animations:^{
                  pill.backgroundColor = on ? C_ON : C_OFF;
                  dot.frame = on ? CGRectMake(25, 3, 20, 20) : CGRectMake(3, 3, 20, 20);
              } completion:nil];
          }

          - (void)refreshUI {
              // Speed buttons
              for (NSNumber *val in self.speedBtns) {
                  UIButton *b = self.speedBtns[val];
                  BOOL active = (speedMode == val.intValue);
                  b.backgroundColor = active ? C_ON : [UIColor colorWithWhite:0.18 alpha:1];
                  [b setTitleColor:active ? [UIColor blackColor] : C_TEXT forState:UIControlStateNormal];
              }
              // Toggles
              [self setToggle:@"godzilla"  on:(sizeMode==1)];
              [self setToggle:@"ghost"     on:(sizeMode==2)];
              [self setToggle:@"bulldozer" on:isBulldozerEnabled];
              [self setToggle:@"hover"     on:isHoverEnabled];
              [self setToggle:@"colorchat" on:isColorChatEnabled];
              [self setToggle:@"chatspam"  on:isSpamEnabled];
              [self setToggle:@"bypass"    on:isBypassPasswordEnabled];

              self.hoverLabel.text = [NSString stringWithFormat:@"Yükseklik: %.0fm", hoverHeight];

              if (isCustomPlateEnabled) {
                  [self.plateBtn setTitle:[NSString stringWithFormat:@"📝  Plaka: %s ✅", customPlateText] forState:UIControlStateNormal];
                  [self.plateBtn setTitleColor:C_ON forState:UIControlStateNormal];
              } else {
                  [self.plateBtn setTitle:@"📝  Özel Plaka Ayarla" forState:UIControlStateNormal];
                  [self.plateBtn setTitleColor:C_GOLD forState:UIControlStateNormal];
              }
          }

          // ===== ACTIONS =====
          - (void)toggle {
              BOOL showing = self.panel.hidden;
              if (showing) {
                  self.panel.hidden = NO;
                  [UIView animateWithDuration:0.35 delay:0 usingSpringWithDamping:0.8 initialSpringVelocity:0.5 options:0 animations:^{
                      self.panel.alpha = 1;
                      self.panel.transform = CGAffineTransformIdentity;
                  } completion:nil];
              } else {
                  [UIView animateWithDuration:0.2 animations:^{
                      self.panel.alpha = 0;
                      self.panel.transform = CGAffineTransformMakeScale(0.9, 0.9);
                  } completion:^(BOOL f){ self.panel.hidden = YES; }];
              }
          }
          - (void)drag:(UIPanGestureRecognizer*)g {
              UIView *v = g.view;
              CGPoint t = [g translationInView:v.superview];
              v.center = CGPointMake(v.center.x+t.x, v.center.y+t.y);
              [g setTranslation:CGPointZero inView:v.superview];
          }

          - (void)speedTap:(UIButton*)s { speedMode = (int)s.tag; [self refreshUI]; }
          - (void)tapGodzilla  { sizeMode = (sizeMode==1)?0:1; [self refreshUI]; }
          - (void)tapGhost     { sizeMode = (sizeMode==2)?0:2; [self refreshUI]; }
          - (void)tapBulldozer { isBulldozerEnabled = !isBulldozerEnabled; [self refreshUI]; }
          - (void)tapHover     { isHoverEnabled = !isHoverEnabled; [self refreshUI]; }
          - (void)tapColorChat { isColorChatEnabled = !isColorChatEnabled; [self refreshUI]; }
          - (void)tapChatSpam {
              isSpamEnabled = !isSpamEnabled;
              if (isSpamEnabled) {
                  spamTimer = [NSTimer scheduledTimerWithTimeInterval:0.1 target:self selector:@selector(fireSpam) userInfo:nil repeats:YES];
              } else { [spamTimer invalidate]; spamTimer = nil; }
              [self refreshUI];
          }
          - (void)tapBypass { isBypassPasswordEnabled = !isBypassPasswordEnabled; [self refreshUI]; }
          - (void)hUp { hoverHeight += 5; [self refreshUI]; }
          - (void)hDn { hoverHeight -= 5; [self refreshUI]; }
          - (void)savePos { isSavePosRequested = true; }
          - (void)tpPos { isTeleportRequested = true; }

          - (void)fireSpam {
              if (!chatGetInst || !chatSend) return;
              void* mgr = chatGetInst(NULL);
              if (!mgr) return;
              void* s = mkStr([NSString stringWithUTF8String:chatSpamText]);
              if (s) chatSend(mgr, s, NULL);
          }

          - (void)editSpam {
              UIAlertController *ac = [UIAlertController alertControllerWithTitle:@"💬 Spam Yazısı" message:nil preferredStyle:UIAlertControllerStyleAlert];
              [ac addTextFieldWithConfigurationHandler:^(UITextField *tf){ tf.text = [NSString stringWithUTF8String:chatSpamText]; tf.clearButtonMode = UITextFieldViewModeAlways; }];
              [ac addAction:[UIAlertAction actionWithTitle:@"Kaydet" style:UIAlertActionStyleDefault handler:^(UIAlertAction *a){
                  NSString *t = ac.textFields.firstObject.text;
                  if(t.length>0) strncpy(chatSpamText, t.UTF8String, 127);
              }]];
              [ac addAction:[UIAlertAction actionWithTitle:@"İptal" style:UIAlertActionStyleCancel handler:nil]];
              [self presentAlert:ac];
          }

          - (void)editPlate {
              UIAlertController *ac = [UIAlertController alertControllerWithTitle:@"🔢 Özel Plaka" message:@"Plakada görünecek yazı:" preferredStyle:UIAlertControllerStyleAlert];
              [ac addTextFieldWithConfigurationHandler:^(UITextField *tf){
                  tf.placeholder = @"FEW1N";
                  if(isCustomPlateEnabled) tf.text = [NSString stringWithUTF8String:customPlateText];
                  tf.clearButtonMode = UITextFieldViewModeAlways;
              }];
              [ac addAction:[UIAlertAction actionWithTitle:@"Uygula" style:UIAlertActionStyleDefault handler:^(UIAlertAction *a){
                  NSString *t = ac.textFields.firstObject.text;
                  if(t.length>0){ strncpy(customPlateText, t.UTF8String, 63); isCustomPlateEnabled=true; [self refreshUI]; }
              }]];
              [ac addAction:[UIAlertAction actionWithTitle:@"Kapat" style:UIAlertActionStyleDestructive handler:^(UIAlertAction *a){
                  isCustomPlateEnabled=false; [self refreshUI];
              }]];
              [self presentAlert:ac];
          }

          - (void)presentAlert:(UIAlertController*)ac {
              UIViewController *vc = [UIApplication sharedApplication].keyWindow.rootViewController;
              while (vc.presentedViewController) vc = vc.presentedViewController;
              [vc presentViewController:ac animated:YES completion:nil];
          }
          @end

          // ===== %ctor =====
          %ctor {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5*NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [[FEW1NMenu shared] build];

                  uintptr_t b = GetBase();
                  if (!b) return;

                  rb_getPos      = (struct Vector3(*)(void*,void*))(b+0x6819010);
                  rb_setPos      = (void(*)(void*,struct Vector3,void*))(b+0x6819124);
                  rb_getVel      = (struct Vector3(*)(void*,void*))(b+0x6817D68);
                  rb_setVel      = (void(*)(void*,struct Vector3,void*))(b+0x6817E7C);
                  rb_setMass     = (void(*)(void*,float,void*))(b+0x681869C);
                  getTransform   = (void*(*)(void*,void*))(b+0x673C9DC);
                  setScale       = (void(*)(void*,struct Vector3,void*))(b+0x6757F98);
                  chatGetInst    = (void*(*)(void*))(b+0x319D630);
                  chatSend       = (void(*)(void*,void*,void*))(b+0x319D734);

                  // ===== TUM HOOKLAR =====
                  MSHookFunction((void*)(b+0x67523F8), (void*)h_setTimeScale, (void**)&o_setTimeScale);
                  MSHookFunction((void*)(b+0x59A77D8), (void*)h_rccp,         (void**)&o_rccp);
                  MSHookFunction((void*)(b+0x5A12550), (void*)h_plateGen,     (void**)&o_plateGen);
                  MSHookFunction((void*)(b+0x5A218F4), (void*)h_genRU,        (void**)&o_genRU);
                  MSHookFunction((void*)(b+0x5A22100), (void*)h_genUS,        (void**)&o_genUS);
                  MSHookFunction((void*)(b+0x5A22ADC), (void*)h_genEU,        (void**)&o_genEU);
                  MSHookFunction((void*)(b+0x5F85AEC), (void*)h_plateText,    (void**)&o_plateText);
                  MSHookFunction((void*)(b+0x319D734), (void*)h_chatSend,     (void**)&o_chatSend);
                  MSHookFunction((void*)(b+0x5497790), (void*)h_roomConnect,  (void**)&o_roomConnect);
                  MSHookFunction((void*)(b+0x548C5CC), (void*)h_enterPwd,     (void**)&o_enterPwd);
              });
          }
          TWEAKEOF

      - name: Build Tweak (Dylib/Deb)
        run: |
          export THEOS=~/theos
          make package clean
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FEW1N-ModMenu-Tweak
          path: packages/*.deb
