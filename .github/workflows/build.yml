name: Build dylib and deb

on:
  push:
    branches: [ master, add-build-workflow ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential fakeroot clang llvm

    - name: Setup Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git ~/theos
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Fix Makefile placeholders
      run: |
        cd template
        sed -i 's/@@PROJECTNAME@@/ModMenu/g' Makefile
        sed -i 's/@@BINARYNAME@@/ModMenu/g' Makefile

    - name: Build
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        cd template
        make clean || true
        make package || true

    - name: Check results
      if: always()
      run: |
        find template -name "*.deb" -o -name "*.dylib" 2>/dev/null
        ls -la template/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-output
        path: template/
        if-no-files-found: ignore
