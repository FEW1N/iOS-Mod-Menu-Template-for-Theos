name: Build dylib and deb

on:
  push:
    branches: [ master, add-build-workflow ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential fakeroot

    - name: Setup Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git ~/theos
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Fix Makefile
      run: |
        cd template
        sed -i 's/@@PROJECTNAME@@/MyTweak/g' Makefile
        sed -i 's/@@BINARYNAME@@/MyTweak/g' Makefile
        cat Makefile | head -50

    - name: Build Package
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        cd template
        make clean 2>&1 || echo "Clean failed but continuing..."
        make package 2>&1
        echo "Build completed"

    - name: List artifacts
      if: always()
      run: |
        echo "Checking for build outputs..."
        find template -type f -name "*.deb" 2>/dev/null || echo "No .deb files found"
        ls -la template/packages/ 2>/dev/null || echo "No packages directory"
        ls -la template/.theos/ 2>/dev/null || echo "No .theos directory"
        find template -type f | head -20

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-artifacts
        path: |
          template/packages/
          template/.theos/
        if-no-files-found: ignore
