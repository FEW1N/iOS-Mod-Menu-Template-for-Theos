name: Build iOS Mod Menu

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install Dependencies (dpkg, ldid)
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew update || true
          brew install dpkg ldid xz || true

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
          echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git
          cp -R sdks/iPhoneOS* ~/theos/sdks/ || true

      - name: Create Tweak Files
        run: |
          cat << 'EOF' > control
          Package: com.ilbas.dreamroadmod
          Name: DreamRoadMod
          Depends: mobilesubstrate
          Version: 5.0
          Architecture: iphoneos-arm
          Description: Dream Road Ultimate Mod Menusu
          Maintainer: ilbas
          Author: ilbas
          Section: Tweaks
          EOF

          cat << 'EOF' > Makefile
          TARGET := iphone:clang:latest:14.0
          ARCHS = arm64
          INSTALL_TARGET_PROCESSES = DreamRoadMultiplayer

          include ~/theos/makefiles/common.mk

          TWEAK_NAME = DreamRoadMod

          DreamRoadMod_FILES = Tweak.xm
          DreamRoadMod_CFLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-error
          DreamRoadMod_FRAMEWORKS = UIKit Foundation

          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF

          cat << 'EOF' > DreamRoadMod.plist
          { Filter = { Bundles = ( "com.TenebryFox.DreamRoadMultiplayer" ); }; }
          EOF

          cat << 'EOF' > Tweak.xm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #include <substrate.h>
          #include <mach-o/dyld.h>
          #include <string.h>

          struct Vector3 { float x; float y; float z; };

          bool isFlyingCarEnabled = false;
          float jumpForce = 5000.0f;
          bool isHoverEnabled = false;
          float hoverHeight = 10.0f;
          
          int sizeMode = 0; // 0=Normal, 1=Godzilla, 2=Gorunmez
          bool isBulldozerEnabled = false;
          
          bool isSavePosRequested = false;
          bool isTeleportRequested = false;
          struct Vector3 savedPosition = {0,0,0};

          uintptr_t GetUnityFrameworkBase() {
              for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                  const char *image_name = _dyld_get_image_name(i);
                  if (image_name && strstr(image_name, "UnityFramework")) {
                      return _dyld_get_image_vmaddr_slide(i);
                  }
              }
              return 0;
          }
          
          void (*SetTimeScale)(float value);
          void (*AddForce)(void* instance, struct Vector3 force, int mode);
          struct Vector3 (*get_position)(void* instance);
          void (*set_position)(void* instance, struct Vector3 value);
          void* (*get_transform)(void* instance);
          void (*set_localScale)(void* instance, struct Vector3 value);
          void (*set_mass)(void* instance, float value);

          void (*old_Move)(void* instance, float steering, float accel, float footbrake, float handbrake);
          
          void hooked_Move(void* instance, float steering, float accel, float footbrake, float handbrake) {
              void* rb = *(void**)((char*)instance + 0x48);
              if (rb && get_position && set_position && AddForce && get_transform && set_localScale && set_mass) {
                  
                  static int lastSizeMode = -1;
                  if (sizeMode != lastSizeMode) {
                      void* transform = get_transform(instance);
                      if (transform) {
                          struct Vector3 newScale = {1.0f, 1.0f, 1.0f};
                          if (sizeMode == 1) { newScale.x = 10.0f; newScale.y = 10.0f; newScale.z = 10.0f; }
                          else if (sizeMode == 2) { newScale.x = 0.0f; newScale.y = 0.0f; newScale.z = 0.0f; }
                          set_localScale(transform, newScale);
                      }
                      lastSizeMode = sizeMode;
                  }

                  static bool lastBulldozer = false;
                  if (isBulldozerEnabled != lastBulldozer) {
                      set_mass(rb, isBulldozerEnabled ? 999999.0f : 1500.0f);
                      lastBulldozer = isBulldozerEnabled;
                  }

                  if (isSavePosRequested) {
                      savedPosition = get_position(rb);
                      isSavePosRequested = false;
                  }
                  if (isTeleportRequested) {
                      set_position(rb, savedPosition);
                      isTeleportRequested = false;
                  }

                  if (isHoverEnabled) {
                      struct Vector3 pos = get_position(rb);
                      pos.y = hoverHeight;
                      set_position(rb, pos);
                  } 
                  if (isFlyingCarEnabled && accel > 0.1f) {
                      struct Vector3 force = {0, jumpForce, 0};
                      AddForce(rb, force, 0);
                  }
              }
              old_Move(instance, steering, accel, footbrake, handbrake);
          }

          @interface ModMenuManager : NSObject
          + (instancetype)sharedManager;
          - (void)setupMenu;
          @end

          @implementation ModMenuManager
          + (instancetype)sharedManager {
              static ModMenuManager *sharedManager = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  sharedManager = [[self alloc] init];
              });
              return sharedManager;
          }

          - (void)setupMenu {
              UIWindow *window = [UIApplication sharedApplication].keyWindow;
              if (!window) return;

              UIButton *menuBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              menuBtn.frame = CGRectMake(20, 50, 60, 60);
              menuBtn.backgroundColor = [UIColor colorWithRed:1.0 green:0.2 blue:0.2 alpha:0.9];
              menuBtn.layer.cornerRadius = 30;
              menuBtn.clipsToBounds = YES;
              [menuBtn setTitle:@"🔥" forState:UIControlStateNormal];
              menuBtn.titleLabel.font = [UIFont systemFontOfSize:30];
              [menuBtn addTarget:self action:@selector(openMenu) forControlEvents:UIControlEventTouchUpInside];
              
              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragButton:)];
              [menuBtn addGestureRecognizer:pan];
              
              [window addSubview:menuBtn];
          }

          - (void)dragButton:(UIPanGestureRecognizer *)pan {
              UIView *button = pan.view;
              CGPoint translation = [pan translationInView:button.superview];
              button.center = CGPointMake(button.center.x + translation.x, button.center.y + translation.y);
              [pan setTranslation:CGPointZero inView:button.superview];
          }

          - (void)openMenu {
              UIWindow *window = [UIApplication sharedApplication].keyWindow;
              UIViewController *rootVC = window.rootViewController;

              UIAlertController *alert = [UIAlertController alertControllerWithTitle:@"🔥 FEW1N MOD MENÜ" message:@"En Cılgin Hileler" preferredStyle:UIAlertControllerStyleActionSheet];

              [alert addAction:[UIAlertAction actionWithTitle:@"Normal Hiz" style:UIAlertActionStyleDefault handler:^(UIAlertAction *action) { if (SetTimeScale) SetTimeScale(1.0f); }]];
              [alert addAction:[UIAlertAction actionWithTitle:@"Super Hiz (5x)" style:UIAlertActionStyleDefault handler:^(UIAlertAction *action) { if (SetTimeScale) SetTimeScale(5.0f); }]];

              NSString *sizeTitle = (sizeMode == 1) ? @"🦖 Godzilla Modu: KAPAT" : @"🦖 Godzilla Modu: AC (Dev)";
              [alert addAction:[UIAlertAction actionWithTitle:sizeTitle style:UIAlertActionStyleDestructive handler:^(UIAlertAction *action) { sizeMode = (sizeMode == 1) ? 0 : 1; }]];
              
              NSString *ghostTitle = (sizeMode == 2) ? @"👻 Hayalet Modu: KAPAT" : @"👻 Hayalet Modu: AC (Gorunmez)";
              [alert addAction:[UIAlertAction actionWithTitle:ghostTitle style:UIAlertActionStyleDestructive handler:^(UIAlertAction *action) { sizeMode = (sizeMode == 2) ? 0 : 2; }]];

              NSString *bullTitle = isBulldozerEnabled ? @"🔨 Buldozer: KAPAT" : @"🔨 Buldozer: AC (999.999 KG)";
              [alert addAction:[UIAlertAction actionWithTitle:bullTitle style:UIAlertActionStyleDestructive handler:^(UIAlertAction *action) { isBulldozerEnabled = !isBulldozerEnabled; }]];

              [alert addAction:[UIAlertAction actionWithTitle:@"📍 Konumumu Kaydet" style:UIAlertActionStyleDefault handler:^(UIAlertAction *action) { isSavePosRequested = true; }]];
              [alert addAction:[UIAlertAction actionWithTitle:@"⚡ Kaydedilen Yere Isinlan" style:UIAlertActionStyleDefault handler:^(UIAlertAction *action) { isTeleportRequested = true; }]];

              NSString *hoverTitle = isHoverEnabled ? @"🚁 Hover: KAPAT" : @"🚁 Hover: AC";
              [alert addAction:[UIAlertAction actionWithTitle:hoverTitle style:UIAlertActionStyleDestructive handler:^(UIAlertAction *action) { isHoverEnabled = !isHoverEnabled; }]];

              [alert addAction:[UIAlertAction actionWithTitle:@"Menuyu Kapat" style:UIAlertActionStyleCancel handler:nil]];

              if (UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {
                  alert.popoverPresentationController.sourceView = window;
                  alert.popoverPresentationController.sourceRect = CGRectMake(CGRectGetMidX(window.bounds), CGRectGetMidY(window.bounds), 0, 0);
                  alert.popoverPresentationController.permittedArrowDirections = 0;
              }

              [rootVC presentViewController:alert animated:YES completion:nil];
          }
          @end

          %ctor {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  [[ModMenuManager sharedManager] setupMenu];
                  
                  uintptr_t baseAddr = GetUnityFrameworkBase();
                  if (baseAddr != 0) {
                      SetTimeScale = (void (*)(float))(baseAddr + 0x67523F8);
                      AddForce = (void (*)(void*, struct Vector3, int))(baseAddr + 0x6819C80);
                      get_position = (struct Vector3 (*)(void*))(baseAddr + 0x6819010);
                      set_position = (void (*)(void*, struct Vector3))(baseAddr + 0x6819124);
                      get_transform = (void* (*)(void*))(baseAddr + 0x673C9DC);
                      set_localScale = (void (*)(void*, struct Vector3))(baseAddr + 0x6757F98);
                      set_mass = (void (*)(void*, float))(baseAddr + 0x681869C);
                      
                      MSHookFunction((void *)(baseAddr + 0x54B0B24), (void *)hooked_Move, (void **)&old_Move);
                  }
              });
          }
          EOF

      - name: Build Tweak (Dylib/Deb)
        run: |
          export THEOS=~/theos
          make package clean
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu-Tweak
          path: packages/*.deb
