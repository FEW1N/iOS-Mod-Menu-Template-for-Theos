name: Build dylib and deb

on:
  push:
    branches: [ master, add-build-workflow ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git curl wget fakeroot

    - name: Clone Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Setup iOS SDK
      run: |
        mkdir -p $THEOS/sdks
        cd $THEOS/sdks
        
        echo "Attempting to download iOS SDK..."
        if ! wget -q --timeout=30 https://github.com/theos/sdks/releases/download/latest/iPhoneOS.sdk.tar.gz 2>/dev/null; then
          echo "Failed to download, trying alternative URL..."
          wget -q https://github.com/theos/sdks/releases/download/latest/iPhoneOS14.5.sdk.tar.gz 2>/dev/null || true
        fi
        
        if ls *.tar.gz 1> /dev/null 2>&1; then
          tar xzf *.tar.gz
          rm -f *.tar.gz
          echo "SDK extracted successfully"
        else
          echo "No SDK found, will attempt build anyway"
        fi

    - name: Build
      run: |
        cd template
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        
        echo "=== Environment ==="
        echo "THEOS: $THEOS"
        which make || echo "make not found"
        
        echo "=== Building ==="
        make clean 2>&1 || true
        make package 2>&1
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-output
        path: template/
        retention-days: 30
