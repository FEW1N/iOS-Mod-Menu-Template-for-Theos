name: Build iOS Mod Menu

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install Dependencies (dpkg, ldid)
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew update || true
          brew install dpkg ldid xz || true

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
          echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git
          cp -R sdks/iPhoneOS* ~/theos/sdks/ || true

      - name: Create Tweak Files
        run: |
          cat << 'EOF' > control
          Package: com.few1n.dreamroadmod
          Name: FEW1N Mod Menu
          Depends: mobilesubstrate
          Version: 7.0
          Architecture: iphoneos-arm
          Description: Ultimate Modern FEW1N Mod Menu
          Maintainer: few1n
          Author: few1n
          Section: Tweaks
          EOF

          cat << 'EOF' > Makefile
          TARGET := iphone:clang:latest:14.0
          ARCHS = arm64
          INSTALL_TARGET_PROCESSES = DreamRoadMultiplayer

          include ~/theos/makefiles/common.mk

          TWEAK_NAME = FEW1NMod

          FEW1NMod_FILES = Tweak.xm
          FEW1NMod_CFLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-error
          FEW1NMod_FRAMEWORKS = UIKit Foundation

          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF

          cat << 'EOF' > FEW1NMod.plist
          { Filter = { Bundles = ( "com.TenebryFox.DreamRoadMultiplayer" ); }; }
          EOF

          cat << 'EOF' > Tweak.xm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #include <substrate.h>
          #include <mach-o/dyld.h>
          #include <string.h>
          #include <dlfcn.h>

          struct Vector3 { float x; float y; float z; };

          int speedMode = 1; // 1, 2, 5, 10
          bool isHoverEnabled = false;
          float hoverHeight = 5.0f;
          
          int sizeMode = 0; // 0=Normal, 1=Godzilla, 2=Gorunmez
          bool isBulldozerEnabled = false;
          
          bool isSavePosRequested = false;
          bool isTeleportRequested = false;
          struct Vector3 savedPosition = {0,0,0};

          bool isCustomPlateEnabled = false;
          char customPlateText[64] = "FEW1N";

          uintptr_t GetUnityFrameworkBase() {
              for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                  const char *image_name = _dyld_get_image_name(i);
                  if (image_name && strstr(image_name, "UnityFramework")) {
                      return _dyld_get_image_vmaddr_slide(i);
                  }
              }
              return 0;
          }
          
          void (*SetTimeScale)(float value, void* method);
          struct Vector3 (*get_position)(void* instance, void* method);
          void (*set_position)(void* instance, struct Vector3 value, void* method);
          struct Vector3 (*get_linearVelocity)(void* instance, void* method);
          void (*set_linearVelocity)(void* instance, struct Vector3 value, void* method);
          void* (*get_transform)(void* instance, void* method);
          void (*set_localScale)(void* instance, struct Vector3 value, void* method);
          void (*set_mass)(void* instance, float value, void* method);

          // Hata Onleme: Il2cpp metodlarinin hepsinde son arguman olarak MethodInfo* (void*) vardir!
          void (*old_Move)(void* instance, float steering, float accel, float footbrake, float handbrake, void* method);
          
          void hooked_Move(void* instance, float steering, float accel, float footbrake, float handbrake, void* method) {
              // 1. Orijinal hareketi cagir (Oyunun kendi fizigi islensin)
              old_Move(instance, steering, accel, footbrake, handbrake, method);

              // 2. Bizim hileleri SONRA uygula ki oyun bizimkileri ezmesin!
              void* rb = *(void**)((char*)instance + 0x48);
              
              // Beden/Boyut Degisimi
              if (get_transform && set_localScale) {
                  void* transform = get_transform(instance, NULL);
                  if (transform) {
                      struct Vector3 newScale = {1.0f, 1.0f, 1.0f};
                      if (sizeMode == 1) { newScale.x = 10.0f; newScale.y = 10.0f; newScale.z = 10.0f; } // Godzilla
                      else if (sizeMode == 2) { newScale.x = 0.0f; newScale.y = 0.0f; newScale.z = 0.0f; } // Hayalet
                      set_localScale(transform, newScale, NULL);
                  }
              }

              if (rb && get_position && set_position && get_linearVelocity && set_linearVelocity) {
                  // Buldozer Modu
                  if (set_mass) {
                      set_mass(rb, isBulldozerEnabled ? 999999.0f : 1500.0f, NULL);
                  }

                  // Teleport (Isinlanma)
                  if (isSavePosRequested) {
                      savedPosition = get_position(rb, NULL);
                      isSavePosRequested = false;
                  }
                  if (isTeleportRequested) {
                      set_position(rb, savedPosition, NULL);
                      struct Vector3 zeroVel = {0,0,0};
                      set_linearVelocity(rb, zeroVel, NULL); // Isinlaninca sarsilmasin
                      isTeleportRequested = false;
                  }

                  // Kesin Hover (Havada Asili Kalma)
                  if (isHoverEnabled) {
                      struct Vector3 vel = get_linearVelocity(rb, NULL);
                      vel.y = 0.0f; // Asagi dusme hizini sifirla
                      set_linearVelocity(rb, vel, NULL);
                      
                      struct Vector3 pos = get_position(rb, NULL);
                      pos.y = hoverHeight;
                      set_position(rb, pos, NULL);
                  } 
              }
          }

          // PLAKA DEGISTIRME HOOK
          void (*old_PlateApply)(void* instance, void* countryStr, void* textStr, void* method);
          void hooked_PlateApply(void* instance, void* countryStr, void* textStr, void* method) {
              if (isCustomPlateEnabled && customPlateText[0] != '\0') {
                  void* (*il2cpp_string_new)(const char* str) = (void* (*)(const char*))dlsym(RTLD_DEFAULT, "il2cpp_string_new");
                  if (il2cpp_string_new) {
                      void* customStr = il2cpp_string_new(customPlateText);
                      old_PlateApply(instance, countryStr, customStr, method);
                      return;
                  }
              }
              old_PlateApply(instance, countryStr, textStr, method);
          }

          // --- MODERN UI KODLARI ---
          @interface FEW1NModMenu : UIView
          @end

          @implementation FEW1NModMenu
          @end

          @interface ModMenuManager : NSObject
          @property (nonatomic, strong) UIButton *floatingBtn;
          @property (nonatomic, strong) FEW1NModMenu *mainPanel;
          
          @property (nonatomic, strong) UIButton *btnSpeed1;
          @property (nonatomic, strong) UIButton *btnSpeed25;
          @property (nonatomic, strong) UIButton *btnSpeed5;
          @property (nonatomic, strong) UIButton *btnSpeed10;
          
          @property (nonatomic, strong) UIButton *btnGodzilla;
          @property (nonatomic, strong) UIButton *btnGhost;
          @property (nonatomic, strong) UIButton *btnHover;
          @property (nonatomic, strong) UIButton *btnBulldozer;
          @property (nonatomic, strong) UIButton *btnCustomPlate;
          
          + (instancetype)sharedManager;
          - (void)setupUI;
          @end

          @implementation ModMenuManager
          + (instancetype)sharedManager {
              static ModMenuManager *sharedManager = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  sharedManager = [[self alloc] init];
              });
              return sharedManager;
          }

          - (void)setupUI {
              UIWindow *window = [UIApplication sharedApplication].keyWindow;
              if (!window) return;

              // 1. Yuzen Buton (Floating Button)
              self.floatingBtn = [UIButton buttonWithType:UIButtonTypeCustom];
              self.floatingBtn.frame = CGRectMake(20, 80, 65, 65);
              self.floatingBtn.backgroundColor = [UIColor colorWithRed:0.1 green:0.1 blue:0.1 alpha:0.9];
              self.floatingBtn.layer.cornerRadius = 32.5;
              self.floatingBtn.layer.borderWidth = 2;
              self.floatingBtn.layer.borderColor = [UIColor redColor].CGColor;
              self.floatingBtn.clipsToBounds = YES;
              
              UILabel *lblF = [[UILabel alloc] initWithFrame:self.floatingBtn.bounds];
              lblF.text = @"F1";
              lblF.textColor = [UIColor redColor];
              lblF.textAlignment = NSTextAlignmentCenter;
              lblF.font = [UIFont boldSystemFontOfSize:22];
              [self.floatingBtn addSubview:lblF];

              [self.floatingBtn addTarget:self action:@selector(togglePanel) forControlEvents:UIControlEventTouchUpInside];
              
              UIPanGestureRecognizer *panBtn = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragButton:)];
              [self.floatingBtn addGestureRecognizer:panBtn];
              [window addSubview:self.floatingBtn];

              // 2. Ana Panel (Main Panel)
              self.mainPanel = [[FEW1NModMenu alloc] initWithFrame:CGRectMake(0, 0, 320, 500)];
              self.mainPanel.center = window.center;
              self.mainPanel.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.05 alpha:0.95];
              self.mainPanel.layer.cornerRadius = 15;
              self.mainPanel.layer.borderWidth = 2;
              self.mainPanel.layer.borderColor = [UIColor redColor].CGColor;
              self.mainPanel.hidden = YES;
              
              UIPanGestureRecognizer *panPanel = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragPanel:)];
              [self.mainPanel addGestureRecognizer:panPanel];
              
              // Baslik
              UILabel *titleLbl = [[UILabel alloc] initWithFrame:CGRectMake(0, 10, 320, 30)];
              titleLbl.text = @"🔥 FEW1N MOD MENÜ";
              titleLbl.textColor = [UIColor whiteColor];
              titleLbl.textAlignment = NSTextAlignmentCenter;
              titleLbl.font = [UIFont boldSystemFontOfSize:22];
              [self.mainPanel addSubview:titleLbl];
              
              // Kapat Butonu
              UIButton *closeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              closeBtn.frame = CGRectMake(280, 10, 30, 30);
              [closeBtn setTitle:@"X" forState:UIControlStateNormal];
              [closeBtn setTitleColor:[UIColor redColor] forState:UIControlStateNormal];
              closeBtn.titleLabel.font = [UIFont boldSystemFontOfSize:20];
              [closeBtn addTarget:self action:@selector(togglePanel) forControlEvents:UIControlEventTouchUpInside];
              [self.mainPanel addSubview:closeBtn];

              // Hiz Butonlari Kutusu (Yan Yana)
              UILabel *speedLbl = [[UILabel alloc] initWithFrame:CGRectMake(10, 50, 300, 20)];
              speedLbl.text = @"Hız Kontrolü (Oto Aktif):";
              speedLbl.textColor = [UIColor lightGrayColor];
              speedLbl.font = [UIFont systemFontOfSize:14];
              [self.mainPanel addSubview:speedLbl];

              self.btnSpeed1 = [self createBtn:@"1x" frame:CGRectMake(10, 75, 70, 40) action:@selector(setSpeed1)];
              self.btnSpeed25 = [self createBtn:@"2.5x" frame:CGRectMake(85, 75, 70, 40) action:@selector(setSpeed25)];
              self.btnSpeed5 = [self createBtn:@"5x" frame:CGRectMake(160, 75, 70, 40) action:@selector(setSpeed5)];
              self.btnSpeed10 = [self createBtn:@"10x" frame:CGRectMake(235, 75, 70, 40) action:@selector(setSpeed10)];
              [self.mainPanel addSubview:self.btnSpeed1];
              [self.mainPanel addSubview:self.btnSpeed25];
              [self.mainPanel addSubview:self.btnSpeed5];
              [self.mainPanel addSubview:self.btnSpeed10];

              // Diger Hileler
              self.btnGodzilla = [self createToggleBtn:@"🦖 Godzilla Modu" frame:CGRectMake(10, 130, 300, 40) action:@selector(toggleGodzilla)];
              self.btnGhost = [self createToggleBtn:@"👻 Hayalet Modu" frame:CGRectMake(10, 180, 300, 40) action:@selector(toggleGhost)];
              self.btnBulldozer = [self createToggleBtn:@"🔨 Buldozer Modu" frame:CGRectMake(10, 230, 300, 40) action:@selector(toggleBulldozer)];
              self.btnHover = [self createToggleBtn:@"🚁 Hover (Havada Asili Kal)" frame:CGRectMake(10, 280, 300, 40) action:@selector(toggleHover)];
              
              [self.mainPanel addSubview:self.btnGodzilla];
              [self.mainPanel addSubview:self.btnGhost];
              [self.mainPanel addSubview:self.btnBulldozer];
              [self.mainPanel addSubview:self.btnHover];

              // Hover Yukseklik Ayarlari (Hover altina)
              UIButton *btnUp = [self createBtn:@"⬆️ +5m" frame:CGRectMake(10, 325, 145, 35) action:@selector(hoverUp)];
              UIButton *btnDown = [self createBtn:@"⬇️ -5m" frame:CGRectMake(165, 325, 145, 35) action:@selector(hoverDown)];
              [self.mainPanel addSubview:btnUp];
              [self.mainPanel addSubview:btnDown];

              // Isinlanma
              UIButton *btnSave = [self createBtn:@"📍 Konum Kaydet" frame:CGRectMake(10, 375, 145, 40) action:@selector(savePos)];
              UIButton *btnTeleport = [self createBtn:@"⚡ Işınlan" frame:CGRectMake(165, 375, 145, 40) action:@selector(teleportPos)];
              btnSave.backgroundColor = [UIColor colorWithRed:0.2 green:0.2 blue:0.8 alpha:1.0];
              btnTeleport.backgroundColor = [UIColor colorWithRed:0.8 green:0.2 blue:0.8 alpha:1.0];
              [self.mainPanel addSubview:btnSave];
              [self.mainPanel addSubview:btnTeleport];

              // PLAKA BELIRLEME BUTONU
              self.btnCustomPlate = [self createBtn:@"📝 Plaka Yazısını Değiştir" frame:CGRectMake(10, 430, 300, 45) action:@selector(setCustomPlate)];
              self.btnCustomPlate.backgroundColor = [UIColor colorWithRed:0.8 green:0.5 blue:0.1 alpha:1.0];
              self.btnCustomPlate.titleLabel.font = [UIFont boldSystemFontOfSize:18];
              [self.mainPanel addSubview:self.btnCustomPlate];

              [window addSubview:self.mainPanel];
              [self updateUIColors];
          }

          - (UIButton *)createBtn:(NSString *)title frame:(CGRect)frame action:(SEL)action {
              UIButton *btn = [UIButton buttonWithType:UIButtonTypeSystem];
              btn.frame = frame;
              [btn setTitle:title forState:UIControlStateNormal];
              [btn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              btn.backgroundColor = [UIColor darkGrayColor];
              btn.layer.cornerRadius = 8;
              btn.titleLabel.font = [UIFont boldSystemFontOfSize:15];
              [btn addTarget:self action:action forControlEvents:UIControlEventTouchUpInside];
              return btn;
          }

          - (UIButton *)createToggleBtn:(NSString *)title frame:(CGRect)frame action:(SEL)action {
              UIButton *btn = [self createBtn:title frame:frame action:action];
              btn.backgroundColor = [UIColor colorWithRed:0.8 green:0.2 blue:0.2 alpha:1.0]; // Kirmizi
              return btn;
          }

          // Surukleme Fonksiyonlari
          - (void)dragButton:(UIPanGestureRecognizer *)pan {
              UIView *view = pan.view;
              CGPoint translation = [pan translationInView:view.superview];
              view.center = CGPointMake(view.center.x + translation.x, view.center.y + translation.y);
              [pan setTranslation:CGPointZero inView:view.superview];
          }
          - (void)dragPanel:(UIPanGestureRecognizer *)pan {
              UIView *view = pan.view;
              CGPoint translation = [pan translationInView:view.superview];
              view.center = CGPointMake(view.center.x + translation.x, view.center.y + translation.y);
              [pan setTranslation:CGPointZero inView:view.superview];
          }

          - (void)togglePanel {
              self.mainPanel.hidden = !self.mainPanel.hidden;
          }

          // Hız Aksiyonları
          - (void)setSpeed1 { speedMode = 1; if (SetTimeScale) SetTimeScale(1.0f, NULL); [self updateUIColors]; }
          - (void)setSpeed25 { speedMode = 2; if (SetTimeScale) SetTimeScale(2.5f, NULL); [self updateUIColors]; }
          - (void)setSpeed5 { speedMode = 5; if (SetTimeScale) SetTimeScale(5.0f, NULL); [self updateUIColors]; }
          - (void)setSpeed10 { speedMode = 10; if (SetTimeScale) SetTimeScale(10.0f, NULL); [self updateUIColors]; }

          // Toggle Aksiyonları
          - (void)toggleGodzilla { sizeMode = (sizeMode == 1) ? 0 : 1; [self updateUIColors]; }
          - (void)toggleGhost { sizeMode = (sizeMode == 2) ? 0 : 2; [self updateUIColors]; }
          - (void)toggleBulldozer { isBulldozerEnabled = !isBulldozerEnabled; [self updateUIColors]; }
          - (void)toggleHover { isHoverEnabled = !isHoverEnabled; [self updateUIColors]; }

          - (void)hoverUp { hoverHeight += 5.0f; }
          - (void)hoverDown { hoverHeight -= 5.0f; }
          - (void)savePos { isSavePosRequested = true; }
          - (void)teleportPos { isTeleportRequested = true; }

          // PLAKA BELIRLEME AKSİYONU
          - (void)setCustomPlate {
              UIAlertController *alert = [UIAlertController alertControllerWithTitle:@"Özel Plaka" message:@"Plakanızda ne yazmasını istersiniz?" preferredStyle:UIAlertControllerStyleAlert];
              
              [alert addTextFieldWithConfigurationHandler:^(UITextField * _Nonnull textField) {
                  textField.placeholder = @"Örn: FEW1N";
                  if (isCustomPlateEnabled) {
                      textField.text = [NSString stringWithUTF8String:customPlateText];
                  }
              }];
              
              UIAlertAction *ok = [UIAlertAction actionWithTitle:@"Uygula" style:UIAlertActionStyleDefault handler:^(UIAlertAction * _Nonnull action) {
                  UITextField *tf = alert.textFields.firstObject;
                  if (tf.text.length > 0) {
                      strncpy(customPlateText, tf.text.UTF8String, 63);
                      isCustomPlateEnabled = true;
                      [self updateUIColors];
                  }
              }];
              
              UIAlertAction *cancel = [UIAlertAction actionWithTitle:@"İptal / Temizle" style:UIAlertActionStyleDestructive handler:^(UIAlertAction * _Nonnull action) {
                  isCustomPlateEnabled = false;
                  [self updateUIColors];
              }];
              
              [alert addAction:cancel];
              [alert addAction:ok];
              
              UIViewController *rootVC = [UIApplication sharedApplication].keyWindow.rootViewController;
              if (rootVC) {
                  UIViewController *presented = rootVC.presentedViewController;
                  if (presented) {
                      [presented presentViewController:alert animated:YES completion:nil];
                  } else {
                      [rootVC presentViewController:alert animated:YES completion:nil];
                  }
              }
          }

          - (void)updateUIColors {
              UIColor *colorOn = [UIColor colorWithRed:0.2 green:0.8 blue:0.2 alpha:1.0]; // Yesil
              UIColor *colorOff = [UIColor colorWithRed:0.8 green:0.2 blue:0.2 alpha:1.0]; // Kirmizi
              UIColor *colorNeutral = [UIColor darkGrayColor];
              
              self.btnSpeed1.backgroundColor = (speedMode == 1) ? colorOn : colorNeutral;
              self.btnSpeed25.backgroundColor = (speedMode == 2) ? colorOn : colorNeutral;
              self.btnSpeed5.backgroundColor = (speedMode == 5) ? colorOn : colorNeutral;
              self.btnSpeed10.backgroundColor = (speedMode == 10) ? colorOn : colorNeutral;

              self.btnGodzilla.backgroundColor = (sizeMode == 1) ? colorOn : colorOff;
              self.btnGhost.backgroundColor = (sizeMode == 2) ? colorOn : colorOff;
              self.btnBulldozer.backgroundColor = isBulldozerEnabled ? colorOn : colorOff;
              self.btnHover.backgroundColor = isHoverEnabled ? colorOn : colorOff;
              
              if (isCustomPlateEnabled) {
                  self.btnCustomPlate.backgroundColor = colorOn;
                  [self.btnCustomPlate setTitle:[NSString stringWithFormat:@"✅ Plaka: %s", customPlateText] forState:UIControlStateNormal];
              } else {
                  self.btnCustomPlate.backgroundColor = [UIColor colorWithRed:0.8 green:0.5 blue:0.1 alpha:1.0];
                  [self.btnCustomPlate setTitle:@"📝 Plaka Yazısını Değiştir" forState:UIControlStateNormal];
              }
          }
          @end

          %ctor {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  [[ModMenuManager sharedManager] setupUI];
                  
                  uintptr_t baseAddr = GetUnityFrameworkBase();
                  if (baseAddr != 0) {
                      SetTimeScale = (void (*)(float, void*))(baseAddr + 0x67523F8);
                      get_position = (struct Vector3 (*)(void*, void*))(baseAddr + 0x6819010);
                      set_position = (void (*)(void*, struct Vector3, void*))(baseAddr + 0x6819124);
                      get_linearVelocity = (struct Vector3 (*)(void*, void*))(baseAddr + 0x6817D68);
                      set_linearVelocity = (void (*)(void*, struct Vector3, void*))(baseAddr + 0x6817E7C);
                      
                      get_transform = (void* (*)(void*, void*))(baseAddr + 0x673C9DC);
                      set_localScale = (void (*)(void*, struct Vector3, void*))(baseAddr + 0x6757F98);
                      set_mass = (void (*)(void*, float, void*))(baseAddr + 0x681869C);
                      
                      MSHookFunction((void *)(baseAddr + 0x54B0B24), (void *)hooked_Move, (void **)&old_Move);
                      
                      // PlateTuner.Apply Hook
                      MSHookFunction((void *)(baseAddr + 0x5F7B9BC), (void *)hooked_PlateApply, (void **)&old_PlateApply);
                  }
              });
          }
          EOF

      - name: Build Tweak (Dylib/Deb)
        run: |
          export THEOS=~/theos
          make package clean
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FEW1N-ModMenu-Tweak
          path: packages/*.deb
