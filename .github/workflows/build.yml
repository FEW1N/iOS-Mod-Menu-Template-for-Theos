name: Build iOS Mod Menu

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install Dependencies (dpkg, ldid)
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew update || true
          brew install dpkg ldid xz || true

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
          echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git
          cp -R sdks/iPhoneOS* ~/theos/sdks/ || true

      - name: Create Tweak Files
        run: |
          cat << 'EOF' > control
          Package: com.few1n.dreamroadmod
          Name: FEW1N Mod Menu
          Depends: mobilesubstrate
          Version: 17.0
          Architecture: iphoneos-arm
          Description: FEW1N Premium Mod Menu v17
          Maintainer: few1n
          Author: few1n
          Section: Tweaks
          EOF

          cat << 'EOF' > Makefile
          TARGET := iphone:clang:latest:14.0
          ARCHS = arm64
          INSTALL_TARGET_PROCESSES = DreamRoadMultiplayer

          include ~/theos/makefiles/common.mk

          TWEAK_NAME = FEW1NMod

          FEW1NMod_FILES = Tweak.xm
          FEW1NMod_CFLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-error
          FEW1NMod_FRAMEWORKS = UIKit Foundation QuartzCore

          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF

          cat << 'EOF' > FEW1NMod.plist
          { Filter = { Bundles = ( "com.TenebryFox.DreamRoadMultiplayer", "com.TenebrssyFox.DreamRoadMultiplayer" ); }; }
          EOF

          cat > Tweak.xm << 'TWEAKEOF'
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <QuartzCore/QuartzCore.h>
          #include <substrate.h>
          #include <mach-o/dyld.h>
          #include <string.h>
          #include <dlfcn.h>

          // ============================================================
          //  v17.0 STABLE - FULL FEATURE BUILD
          //
          //  IL2CPP CALLING CONVENTION:
          //  - Instance: Ret Method(void* this, params..., void* method)
          //  - Static:   Ret Method(void* this_NULL, params..., void* method)
          //
          //  DOGRULANMIS RVA TABLOSU (dump.cs)
          // ============================================================
          // Time.set_timeScale(float)            [STATIC]   -> 0x67523F8
          // PhotonNetwork.set_NickName(string)   [STATIC]   -> 0x59161D0
          // PlateGenerators.Generate(string)     [STATIC]   -> 0x5A12550
          // PlateGenerators.GenerateRussian()    [STATIC]   -> 0x5A218F4
          // PlateGenerators.GenerateUS()         [STATIC]   -> 0x5A22100
          // PlateGenerators.GenerateEU()         [STATIC]   -> 0x5A22ADC
          // PlateTuner.get_plateText()           [INSTANCE] -> 0x5F85AEC
          // ChatManager.get_Instance()           [STATIC]   -> 0x319D630
          // ChatManager.Send(string)             [INSTANCE] -> 0x319D734
          // HR_UI_RoomListLine.Connect()         [INSTANCE] -> 0x5497790
          // HR_PhotonLobbyManager.EnterPassword()[INSTANCE] -> 0x548C5CC
          // TMP_InputField.set_text(string)      [INSTANCE] -> 0x65D6B24
          // RCCP_CarController.Update()          [INSTANCE] -> 0x59A77D8
          // CarNitro.get_nitroAmount()           [INSTANCE] -> 0x54B3E98
          // ============================================================
          //  RCCP_CarController FIELD OFFSETS:
          //    _engine (RCCP_Engine*)  -> 0x58
          //    maximumSpeed (float)    -> 0x138
          //  RCCP_Engine FIELD OFFSETS:
          //    maxTorqueAtRPM (float)  -> 0x5C
          //    maximumTorqueAsNM (float) -> 0x94
          //  CarNitro FIELD OFFSETS:
          //    nitroAmount (float)     -> 0x34
          // ============================================================

          // ===== STATE =====
          static int speedMode = 1;
          static bool isCustomPlateEnabled = false;
          static char customPlateText[64] = "FEW1N";
          static bool isColorChatEnabled = false;
          static bool isSpamEnabled = false;
          static char chatSpamText[128] = "FEW1N MOD MENU!";
          static NSTimer *spamTimer = nil;
          static NSTimer *speedEnforceTimer = nil;
          static bool isBypassPasswordEnabled = true;
          static bool isEnginePowerEnabled = false;
          static bool isMaxSpeedEnabled = false;
          static bool isInfiniteNitroEnabled = false;

          // ===== IL2CPP HELPERS =====
          static void* (*cached_il2cpp_string_new)(const char*) = NULL;
          static uintptr_t global_base = 0;

          static void* mkStr(NSString* s) {
              if (!cached_il2cpp_string_new)
                  cached_il2cpp_string_new = (void*(*)(const char*))dlsym(RTLD_DEFAULT, "il2cpp_string_new");
              return (cached_il2cpp_string_new && s) ? cached_il2cpp_string_new(s.UTF8String) : NULL;
          }

          static NSString* readStr(void* il2s) {
              if (!il2s) return @"";
              int32_t len = *(int32_t*)((uintptr_t)il2s + 0x10);
              if (len <= 0 || len > 4096) return @"";
              return [NSString stringWithCharacters:(unichar*)((uintptr_t)il2s + 0x14) length:len];
          }

          // ===== FUNCTION POINTERS =====
          static void* (*chatGetInst)(void*, void*);
          static void (*chatSend)(void*, void*, void*);
          static void (*tmp_set_text)(void*, void*, void*);
          static void (*pn_setNickName)(void*, void*, void*);

          // ================================================================
          //  HOOK 1: Time.set_timeScale  [STATIC]
          // ================================================================
          static void (*o_setTimeScale)(void*, float, void*);
          static void h_setTimeScale(void* __this, float v, void* m) {
              if (speedMode == 2)  v = 2.5f;
              else if (speedMode == 5)  v = 5.0f;
              else if (speedMode == 10) v = 10.0f;
              o_setTimeScale(__this, v, m);
          }

          // ================================================================
          //  HOOK 2: RCCP_CarController.Update()  [INSTANCE]
          //  Motor gucu + maks hiz burada uygulanir
          // ================================================================
          static void (*o_rccp)(void*, void*);
          static void h_rccp(void* self, void* m) {
              o_rccp(self, m);
              @try {
                  // Engine Power Boost
                  if (isEnginePowerEnabled) {
                      void* engine = *(void**)((uintptr_t)self + 0x58);
                      if (engine) {
                          *(float*)((uintptr_t)engine + 0x5C) = 9999.0f;   // maxTorqueAtRPM
                          *(float*)((uintptr_t)engine + 0x94) = 9999.0f;   // maximumTorqueAsNM
                      }
                  }
                  // Max Speed Override
                  if (isMaxSpeedEnabled) {
                      *(float*)((uintptr_t)self + 0x138) = 999.0f;         // maximumSpeed
                  }
              } @catch (...) {}
          }

          // ================================================================
          //  HOOK 3: CarNitro.get_nitroAmount()  [INSTANCE]
          //  Sonsuz nitro: her zaman 1.0 dondur
          // ================================================================
          static float (*o_getNitro)(void*, void*);
          static float h_getNitro(void* self, void* m) {
              if (isInfiniteNitroEnabled) return 1.0f;
              return o_getNitro(self, m);
          }

          // ================================================================
          //  HOOK 4: PlateGenerators.Generate(string)  [STATIC]
          // ================================================================
          static void* (*o_plateGen)(void*, void*, void*);
          static void* h_plateGen(void* __this, void* country, void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_plateGen(__this, country, m);
          }

          // ================================================================
          //  HOOK 5: PlateGenerators.GenerateRussian()  [STATIC]
          // ================================================================
          static void* (*o_genRU)(void*, void*);
          static void* h_genRU(void* __this, void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_genRU(__this, m);
          }

          // ================================================================
          //  HOOK 6: PlateGenerators.GenerateUS()  [STATIC]
          // ================================================================
          static void* (*o_genUS)(void*, void*);
          static void* h_genUS(void* __this, void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_genUS(__this, m);
          }

          // ================================================================
          //  HOOK 7: PlateGenerators.GenerateEU()  [STATIC]
          // ================================================================
          static void* (*o_genEU)(void*, void*);
          static void* h_genEU(void* __this, void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_genEU(__this, m);
          }

          // ================================================================
          //  HOOK 8: PlateTuner.get_plateText()  [INSTANCE]
          // ================================================================
          static void* (*o_plateText)(void*, void*);
          static void* h_plateText(void* self, void* m) {
              if (isCustomPlateEnabled && customPlateText[0]) {
                  void* r = mkStr([NSString stringWithUTF8String:customPlateText]);
                  if (r) return r;
              }
              return o_plateText(self, m);
          }

          // ================================================================
          //  HOOK 9: ChatManager.Send(string)  [INSTANCE]
          // ================================================================
          static void (*o_chatSend)(void*, void*, void*);
          static void h_chatSend(void* self, void* msg, void* m) {
              if (isColorChatEnabled && msg) {
                  NSString *orig = readStr(msg);
                  if (orig.length > 0) {
                      void* colored = mkStr([NSString stringWithFormat:@"<color=cyan><b>[FEW1N]</b></color> %@", orig]);
                      if (colored) { o_chatSend(self, colored, m); return; }
                  }
              }
              o_chatSend(self, msg, m);
          }

          // ================================================================
          //  HOOK 10: HR_UI_RoomListLine.Connect()  [INSTANCE]
          // ================================================================
          static void (*o_roomConnect)(void*, void*);
          static void h_roomConnect(void* self, void* m) {
              if (isBypassPasswordEnabled) {
                  @try {
                      void* empty = mkStr(@"");
                      if (empty) *(void**)((uintptr_t)self + 0x50) = empty;
                  } @catch (...) {}
              }
              o_roomConnect(self, m);
          }

          // ================================================================
          //  HOOK 11: HR_PhotonLobbyManager.EnterPassword()  [INSTANCE]
          // ================================================================
          static void (*o_enterPwd)(void*, void*);
          static void h_enterPwd(void* self, void* m) {
              if (isBypassPasswordEnabled) {
                  @try {
                      void* pwdInput = *(void**)((uintptr_t)self + 0x60);
                      if (pwdInput && tmp_set_text) {
                          void* empty = mkStr(@"");
                          if (empty) tmp_set_text(pwdInput, empty, NULL);
                      }
                  } @catch (...) {}
              }
              o_enterPwd(self, m);
          }

          // =============================================================
          //  CYBER-GLASS PREMIUM MOD MENU UI  v17
          // =============================================================

          #define C_BG     [UIColor colorWithRed:0.04 green:0.06 blue:0.10 alpha:0.65]
          #define C_CARD   [UIColor colorWithRed:1.0 green:1.0 blue:1.0 alpha:0.06]
          #define C_ON     [UIColor colorWithRed:0.0 green:1.0 blue:0.53 alpha:1.0]
          #define C_OFF    [UIColor colorWithRed:0.22 green:0.25 blue:0.32 alpha:1.0]
          #define C_RED    [UIColor colorWithRed:1.0 green:0.22 blue:0.38 alpha:1.0]
          #define C_ACCENT [UIColor colorWithRed:0.52 green:0.22 blue:1.0 alpha:1.0]
          #define C_GOLD   [UIColor colorWithRed:1.0 green:0.73 blue:0.15 alpha:1.0]
          #define C_CYAN   [UIColor colorWithRed:0.0 green:0.90 blue:1.0 alpha:1.0]
          #define C_TEXT   [UIColor colorWithWhite:1.0 alpha:0.95]
          #define C_SUB    [UIColor colorWithWhite:1.0 alpha:0.50]

          @interface FEW1NMenu : NSObject
          @property (nonatomic, strong) UIButton *fab;
          @property (nonatomic, strong) UIView *panel;
          @property (nonatomic, strong) UIScrollView *scrollView;
          @property (nonatomic, strong) UIView *contentView;
          @property (nonatomic, strong) NSMutableDictionary *toggleViews;
          @property (nonatomic, strong) NSMutableDictionary *speedBtns;
          @property (nonatomic, strong) UIButton *plateBtn;
          @property (nonatomic, strong) UIButton *nameBtn;
          + (instancetype)shared;
          - (void)build;
          - (void)forceApplySpeed;
          @end

          @implementation FEW1NMenu

          + (instancetype)shared {
              static FEW1NMenu *i; static dispatch_once_t t;
              dispatch_once(&t, ^{ i = [[self alloc] init]; });
              return i;
          }

          - (void)build {
              UIWindow *w = [UIApplication sharedApplication].keyWindow;
              if (!w) return;
              self.toggleViews = [NSMutableDictionary new];
              self.speedBtns = [NSMutableDictionary new];

              // ===== FAB =====
              self.fab = [UIButton buttonWithType:UIButtonTypeCustom];
              self.fab.frame = CGRectMake(16, 100, 56, 56);
              self.fab.layer.cornerRadius = 28;
              self.fab.clipsToBounds = NO;

              UIView *pulseRing = [[UIView alloc] initWithFrame:self.fab.bounds];
              pulseRing.layer.cornerRadius = 28;
              pulseRing.backgroundColor = C_CYAN;
              pulseRing.alpha = 0.4;
              pulseRing.userInteractionEnabled = NO;
              [self.fab addSubview:pulseRing];
              [UIView animateWithDuration:1.8 delay:0 options:UIViewAnimationOptionRepeat|UIViewAnimationOptionCurveEaseOut animations:^{
                  pulseRing.transform = CGAffineTransformMakeScale(1.6, 1.6);
                  pulseRing.alpha = 0.0;
              } completion:nil];

              CAGradientLayer *fabGrad = [CAGradientLayer layer];
              fabGrad.frame = self.fab.bounds; fabGrad.cornerRadius = 28;
              fabGrad.colors = @[(id)C_CYAN.CGColor, (id)C_ACCENT.CGColor];
              fabGrad.startPoint = CGPointMake(0,0); fabGrad.endPoint = CGPointMake(1,1);
              [self.fab.layer insertSublayer:fabGrad atIndex:0];
              self.fab.layer.shadowColor = C_CYAN.CGColor;
              self.fab.layer.shadowOffset = CGSizeMake(0,0);
              self.fab.layer.shadowRadius = 15; self.fab.layer.shadowOpacity = 0.8;

              UILabel *fabLbl = [[UILabel alloc] initWithFrame:self.fab.bounds];
              fabLbl.text = @"F1"; fabLbl.textColor = [UIColor whiteColor];
              fabLbl.textAlignment = NSTextAlignmentCenter;
              fabLbl.font = [UIFont systemFontOfSize:22 weight:UIFontWeightBlack];
              [self.fab addSubview:fabLbl];
              [self.fab addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              UIPanGestureRecognizer *pg1 = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(drag:)];
              [self.fab addGestureRecognizer:pg1];
              [w addSubview:self.fab];

              // ===== PANEL =====
              CGFloat pw = 310, ph = 580;
              self.panel = [[UIView alloc] initWithFrame:CGRectMake((w.bounds.size.width-pw)/2, (w.bounds.size.height-ph)/2, pw, ph)];
              self.panel.backgroundColor = C_BG;
              self.panel.layer.cornerRadius = 28;
              self.panel.layer.borderWidth = 1.5;
              self.panel.layer.borderColor = [UIColor colorWithWhite:1.0 alpha:0.12].CGColor;
              self.panel.layer.shadowColor = C_CYAN.CGColor;
              self.panel.layer.shadowOffset = CGSizeMake(0,0);
              self.panel.layer.shadowRadius = 25; self.panel.layer.shadowOpacity = 0.4;
              self.panel.clipsToBounds = YES;
              self.panel.hidden = YES; self.panel.alpha = 0;
              self.panel.transform = CGAffineTransformMakeScale(0.85, 0.85);

              UIBlurEffect *blur = [UIBlurEffect effectWithStyle:UIBlurEffectStyleDark];
              UIVisualEffectView *blurV = [[UIVisualEffectView alloc] initWithEffect:blur];
              blurV.frame = self.panel.bounds;
              blurV.autoresizingMask = UIViewAutoresizingFlexibleWidth|UIViewAutoresizingFlexibleHeight;
              [self.panel insertSubview:blurV atIndex:0];

              UIPanGestureRecognizer *pg2 = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(drag:)];
              [self.panel addGestureRecognizer:pg2];

              // ===== HEADER =====
              UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, pw, 60)];
              header.backgroundColor = [UIColor colorWithWhite:0 alpha:0.2];

              UILabel *titleLbl = [[UILabel alloc] initWithFrame:CGRectMake(16, 10, pw-80, 26)];
              titleLbl.text = @"FEW1N MOD MENU";
              titleLbl.textColor = [UIColor whiteColor];
              titleLbl.font = [UIFont systemFontOfSize:18 weight:UIFontWeightBlack];
              [header addSubview:titleLbl];

              UILabel *verLbl = [[UILabel alloc] initWithFrame:CGRectMake(16, 34, pw-80, 16)];
              verLbl.text = [NSString stringWithFormat:@"v17.0 STABLE | Base: 0x%lX", (unsigned long)global_base];
              verLbl.textColor = C_CYAN;
              verLbl.font = [UIFont fontWithName:@"Menlo-Bold" size:9] ?: [UIFont systemFontOfSize:9 weight:UIFontWeightBold];
              [header addSubview:verLbl];

              UIView *neonLine = [[UIView alloc] initWithFrame:CGRectMake(0, 58, pw, 2)];
              CAGradientLayer *lineGrad = [CAGradientLayer layer];
              lineGrad.frame = neonLine.bounds;
              lineGrad.colors = @[(id)C_CYAN.CGColor, (id)C_ACCENT.CGColor];
              lineGrad.startPoint = CGPointMake(0,0.5); lineGrad.endPoint = CGPointMake(1,0.5);
              [neonLine.layer addSublayer:lineGrad];
              [header addSubview:neonLine];

              UIButton *closeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              closeBtn.frame = CGRectMake(pw-46, 10, 36, 36);
              [closeBtn setTitle:@"\u2715" forState:UIControlStateNormal];
              [closeBtn setTitleColor:[UIColor colorWithWhite:1 alpha:0.6] forState:UIControlStateNormal];
              closeBtn.titleLabel.font = [UIFont systemFontOfSize:20 weight:UIFontWeightLight];
              [closeBtn addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [header addSubview:closeBtn];
              [self.panel addSubview:header];

              // ===== SCROLL =====
              self.scrollView = [[UIScrollView alloc] initWithFrame:CGRectMake(0, 60, pw, ph-60)];
              self.scrollView.showsVerticalScrollIndicator = NO;
              [self.panel addSubview:self.scrollView];
              self.contentView = [[UIView alloc] initWithFrame:CGRectMake(0, 0, pw, 0)];
              [self.scrollView addSubview:self.contentView];

              CGFloat y = 12;

              // ======= HIZ =======
              y = [self addSectionHeader:@"\u26A1  HIZ KONTROLU" atY:y];
              UIView *speedRow = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 44)];
              speedRow.backgroundColor = C_CARD; speedRow.layer.cornerRadius = 12;
              speedRow.layer.borderWidth = 1; speedRow.layer.borderColor = [UIColor colorWithWhite:1 alpha:0.04].CGColor;
              NSArray *speeds = @[@"1x", @"2.5x", @"5x", @"10x"];
              NSArray *speedVals = @[@1, @2, @5, @10];
              CGFloat bw = (pw-24-10*3-16)/4;
              for (int i = 0; i < 4; i++) {
                  UIButton *sb = [UIButton buttonWithType:UIButtonTypeSystem];
                  sb.frame = CGRectMake(8 + i*(bw+10), 6, bw, 32);
                  sb.layer.cornerRadius = 10;
                  [sb setTitle:speeds[i] forState:UIControlStateNormal];
                  sb.titleLabel.font = [UIFont systemFontOfSize:13 weight:UIFontWeightBold];
                  sb.tag = [speedVals[i] intValue];
                  [sb addTarget:self action:@selector(speedTap:) forControlEvents:UIControlEventTouchUpInside];
                  [speedRow addSubview:sb];
                  self.speedBtns[speedVals[i]] = sb;
              }
              [self.contentView addSubview:speedRow];
              y += 56;

              // ======= ARAC =======
              y = [self addSectionHeader:@"\U0001F3CE  ARAC HILELERI" atY:y];
              y = [self addToggleCard:@"\U0001F527  Motor Gucu"    sub:@"Tork 9999 - Maks guc"       key:@"engine"  atY:y action:@selector(tapEngine)];
              y = [self addToggleCard:@"\U0001F680  Maks Hiz"      sub:@"Hiz limiti 999'a cikar"     key:@"maxspd"  atY:y action:@selector(tapMaxSpeed)];
              y = [self addToggleCard:@"\U0001F4A8  Sonsuz Nitro"  sub:@"Nitro hic bitmesin"         key:@"nitro"   atY:y action:@selector(tapNitro)];

              // ======= CHAT =======
              y = [self addSectionHeader:@"\U0001F4AC  CHAT" atY:y];
              y = [self addToggleCard:@"\U0001F3A8  Renkli Chat"   sub:@"[FEW1N] prefix + cyan"      key:@"colorchat" atY:y action:@selector(tapColorChat)];
              y = [self addToggleCard:@"\U0001F4E2  Chat Spam"     sub:@"50ms aralikla mesaj"         key:@"chatspam"  atY:y action:@selector(tapChatSpam)];

              UIView *spamRow = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 44)];
              spamRow.backgroundColor = C_CARD; spamRow.layer.cornerRadius = 12;
              spamRow.layer.borderWidth = 1; spamRow.layer.borderColor = [UIColor colorWithWhite:1 alpha:0.04].CGColor;
              UIButton *editSpam = [UIButton buttonWithType:UIButtonTypeSystem];
              editSpam.frame = CGRectMake(0, 0, pw-24, 44);
              [editSpam setTitle:@"\u270F\uFE0F  Spam Yazisini Duzenle" forState:UIControlStateNormal];
              [editSpam setTitleColor:C_CYAN forState:UIControlStateNormal];
              editSpam.titleLabel.font = [UIFont systemFontOfSize:13 weight:UIFontWeightSemibold];
              [editSpam addTarget:self action:@selector(editSpam) forControlEvents:UIControlEventTouchUpInside];
              [spamRow addSubview:editSpam];
              [self.contentView addSubview:spamRow];
              y += 52;

              // ======= PLAKA =======
              y = [self addSectionHeader:@"\U0001F522  PLAKA" atY:y];
              UIView *plateCard = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 48)];
              plateCard.backgroundColor = C_CARD; plateCard.layer.cornerRadius = 12;
              plateCard.layer.borderWidth = 1; plateCard.layer.borderColor = [UIColor colorWithWhite:1 alpha:0.04].CGColor;
              self.plateBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              self.plateBtn.frame = CGRectMake(0, 0, pw-24, 48);
              [self.plateBtn setTitle:@"\U0001F4DD  Ozel Plaka Ayarla" forState:UIControlStateNormal];
              [self.plateBtn setTitleColor:C_GOLD forState:UIControlStateNormal];
              self.plateBtn.titleLabel.font = [UIFont systemFontOfSize:14 weight:UIFontWeightBold];
              [self.plateBtn addTarget:self action:@selector(editPlate) forControlEvents:UIControlEventTouchUpInside];
              [plateCard addSubview:self.plateBtn];
              [self.contentView addSubview:plateCard];
              y += 60;

              // ======= ISIM =======
              y = [self addSectionHeader:@"\U0001F4DB  OYUNCU" atY:y];
              UIView *nameCard = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 48)];
              nameCard.backgroundColor = C_CARD; nameCard.layer.cornerRadius = 12;
              nameCard.layer.borderWidth = 1; nameCard.layer.borderColor = [UIColor colorWithWhite:1 alpha:0.04].CGColor;
              self.nameBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              self.nameBtn.frame = CGRectMake(0, 0, pw-24, 48);
              [self.nameBtn setTitle:@"\U0001F4DB  Isim Degistir" forState:UIControlStateNormal];
              [self.nameBtn setTitleColor:C_CYAN forState:UIControlStateNormal];
              self.nameBtn.titleLabel.font = [UIFont systemFontOfSize:14 weight:UIFontWeightBold];
              [self.nameBtn addTarget:self action:@selector(changeName) forControlEvents:UIControlEventTouchUpInside];
              [nameCard addSubview:self.nameBtn];
              [self.contentView addSubview:nameCard];
              y += 60;

              // ======= ODA =======
              y = [self addSectionHeader:@"\U0001F511  ODA" atY:y];
              y = [self addToggleCard:@"\U0001F513  Sifre Kirici"  sub:@"Sifreli odalara gir"  key:@"bypass"  atY:y action:@selector(tapBypass)];

              // ===== STATUS =====
              UIView *statusCard = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 36)];
              statusCard.backgroundColor = [UIColor colorWithRed:0.0 green:1.0 blue:0.53 alpha:0.08];
              statusCard.layer.cornerRadius = 10;
              statusCard.layer.borderWidth = 1;
              statusCard.layer.borderColor = [UIColor colorWithRed:0.0 green:1.0 blue:0.53 alpha:0.2].CGColor;
              UILabel *statusLbl = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, pw-24, 36)];
              statusLbl.text = global_base ? @"\u2705 Hooklar aktif" : @"\u274C Framework bulunamadi";
              statusLbl.textColor = global_base ? C_ON : C_RED;
              statusLbl.textAlignment = NSTextAlignmentCenter;
              statusLbl.font = [UIFont systemFontOfSize:11 weight:UIFontWeightBold];
              [statusCard addSubview:statusLbl];
              [self.contentView addSubview:statusCard];
              y += 44;

              UILabel *foot = [[UILabel alloc] initWithFrame:CGRectMake(0, y+4, pw, 24)];
              foot.text = @"made by few1n \U0001F5A4";
              foot.textColor = [UIColor colorWithWhite:0.3 alpha:1]; foot.textAlignment = NSTextAlignmentCenter;
              foot.font = [UIFont systemFontOfSize:10 weight:UIFontWeightMedium];
              [self.contentView addSubview:foot];
              y += 36;

              self.contentView.frame = CGRectMake(0, 0, pw, y);
              self.scrollView.contentSize = CGSizeMake(pw, y);
              [w addSubview:self.panel];
              [self refreshUI];

              speedEnforceTimer = [NSTimer scheduledTimerWithTimeInterval:0.5 target:self selector:@selector(forceApplySpeed) userInfo:nil repeats:YES];
          }

          // ===== UI HELPERS =====
          - (CGFloat)addSectionHeader:(NSString*)text atY:(CGFloat)y {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(20, y, 270, 20)];
              l.text = text; l.textColor = C_CYAN;
              l.font = [UIFont systemFontOfSize:11 weight:UIFontWeightBlack];
              [self.contentView addSubview:l];
              return y + 26;
          }

          - (CGFloat)addToggleCard:(NSString*)title sub:(NSString*)sub key:(NSString*)key atY:(CGFloat)y action:(SEL)action {
              CGFloat pw = self.panel.bounds.size.width;
              UIView *card = [[UIView alloc] initWithFrame:CGRectMake(12, y, pw-24, 56)];
              card.backgroundColor = C_CARD; card.layer.cornerRadius = 14;
              card.layer.borderWidth = 1.0;
              card.layer.borderColor = [UIColor colorWithWhite:1.0 alpha:0.04].CGColor;

              UILabel *tl = [[UILabel alloc] initWithFrame:CGRectMake(16, 8, pw-100, 22)];
              tl.text = title; tl.textColor = C_TEXT;
              tl.font = [UIFont systemFontOfSize:14 weight:UIFontWeightSemibold];
              [card addSubview:tl];

              UILabel *sl = [[UILabel alloc] initWithFrame:CGRectMake(16, 30, pw-100, 16)];
              sl.text = sub; sl.textColor = C_SUB;
              sl.font = [UIFont systemFontOfSize:10 weight:UIFontWeightMedium];
              [card addSubview:sl];

              UIView *pill = [[UIView alloc] initWithFrame:CGRectMake(pw-24-60, 15, 44, 24)];
              pill.backgroundColor = C_OFF; pill.layer.cornerRadius = 12; pill.tag = 100;
              UIView *dot = [[UIView alloc] initWithFrame:CGRectMake(2, 2, 20, 20)];
              dot.backgroundColor = [UIColor whiteColor]; dot.layer.cornerRadius = 10; dot.tag = 101;
              dot.layer.shadowColor = [UIColor blackColor].CGColor;
              dot.layer.shadowOffset = CGSizeMake(0,1); dot.layer.shadowRadius = 2; dot.layer.shadowOpacity = 0.3;
              [pill addSubview:dot]; [card addSubview:pill];

              UIButton *tapBtn = [UIButton buttonWithType:UIButtonTypeCustom];
              tapBtn.frame = card.bounds;
              [tapBtn addTarget:self action:action forControlEvents:UIControlEventTouchUpInside];
              [card addSubview:tapBtn];

              [self.contentView addSubview:card];
              self.toggleViews[key] = pill;
              return y + 64;
          }

          - (void)setToggle:(NSString*)key on:(BOOL)on {
              UIView *pill = self.toggleViews[key];
              if (!pill) return;
              UIView *dot = [pill viewWithTag:101];
              [UIView animateWithDuration:0.3 delay:0 usingSpringWithDamping:0.6 initialSpringVelocity:0.5 options:0 animations:^{
                  pill.backgroundColor = on ? C_ON : C_OFF;
                  dot.frame = on ? CGRectMake(22, 2, 20, 20) : CGRectMake(2, 2, 20, 20);
                  if (on) { pill.layer.shadowColor = C_ON.CGColor; pill.layer.shadowOffset = CGSizeMake(0,0); pill.layer.shadowRadius = 8; pill.layer.shadowOpacity = 0.6; }
                  else { pill.layer.shadowOpacity = 0.0; }
              } completion:nil];
          }

          - (void)refreshUI {
              for (NSNumber *val in self.speedBtns) {
                  UIButton *b = self.speedBtns[val];
                  BOOL active = (speedMode == val.intValue);
                  b.backgroundColor = active ? C_ON : [UIColor colorWithWhite:0.18 alpha:1];
                  [b setTitleColor:active ? [UIColor blackColor] : C_TEXT forState:UIControlStateNormal];
                  if (active) { b.layer.shadowColor = C_ON.CGColor; b.layer.shadowRadius = 6; b.layer.shadowOpacity = 0.5; b.layer.shadowOffset = CGSizeMake(0,0); }
                  else { b.layer.shadowOpacity = 0; }
              }
              [self setToggle:@"engine"    on:isEnginePowerEnabled];
              [self setToggle:@"maxspd"    on:isMaxSpeedEnabled];
              [self setToggle:@"nitro"     on:isInfiniteNitroEnabled];
              [self setToggle:@"colorchat" on:isColorChatEnabled];
              [self setToggle:@"chatspam"  on:isSpamEnabled];
              [self setToggle:@"bypass"    on:isBypassPasswordEnabled];

              if (isCustomPlateEnabled) {
                  [self.plateBtn setTitle:[NSString stringWithFormat:@"\U0001F4DD  Plaka: %s \u2705", customPlateText] forState:UIControlStateNormal];
                  [self.plateBtn setTitleColor:C_ON forState:UIControlStateNormal];
              } else {
                  [self.plateBtn setTitle:@"\U0001F4DD  Ozel Plaka Ayarla" forState:UIControlStateNormal];
                  [self.plateBtn setTitleColor:C_GOLD forState:UIControlStateNormal];
              }
          }

          // ===== ACTIONS =====
          - (void)toggle {
              BOOL showing = self.panel.hidden;
              if (showing) {
                  self.panel.hidden = NO;
                  [UIView animateWithDuration:0.35 delay:0 usingSpringWithDamping:0.8 initialSpringVelocity:0.5 options:0 animations:^{
                      self.panel.alpha = 1; self.panel.transform = CGAffineTransformIdentity;
                  } completion:nil];
              } else {
                  [UIView animateWithDuration:0.2 animations:^{
                      self.panel.alpha = 0; self.panel.transform = CGAffineTransformMakeScale(0.9, 0.9);
                  } completion:^(BOOL f){ self.panel.hidden = YES; }];
              }
          }
          - (void)drag:(UIPanGestureRecognizer*)g {
              UIView *v = g.view;
              CGPoint t = [g translationInView:v.superview];
              v.center = CGPointMake(v.center.x+t.x, v.center.y+t.y);
              [g setTranslation:CGPointZero inView:v.superview];
          }
          - (void)forceApplySpeed {
              if (!o_setTimeScale) return;
              float v = 1.0f;
              if (speedMode == 2) v = 2.5f;
              else if (speedMode == 5) v = 5.0f;
              else if (speedMode == 10) v = 10.0f;
              o_setTimeScale(NULL, v, NULL);
          }
          - (void)speedTap:(UIButton*)s {
              speedMode = (int)s.tag;
              [self refreshUI];
              [self forceApplySpeed];
          }
          - (void)tapEngine     { isEnginePowerEnabled = !isEnginePowerEnabled; [self refreshUI]; }
          - (void)tapMaxSpeed   { isMaxSpeedEnabled = !isMaxSpeedEnabled; [self refreshUI]; }
          - (void)tapNitro      { isInfiniteNitroEnabled = !isInfiniteNitroEnabled; [self refreshUI]; }
          - (void)tapColorChat  { isColorChatEnabled = !isColorChatEnabled; [self refreshUI]; }
          - (void)tapChatSpam {
              isSpamEnabled = !isSpamEnabled;
              if (isSpamEnabled) {
                  spamTimer = [NSTimer scheduledTimerWithTimeInterval:0.05 target:self selector:@selector(fireSpam) userInfo:nil repeats:YES];
              } else { [spamTimer invalidate]; spamTimer = nil; }
              [self refreshUI];
          }
          - (void)tapBypass { isBypassPasswordEnabled = !isBypassPasswordEnabled; [self refreshUI]; }

          - (void)fireSpam {
              if (!chatGetInst || !chatSend) return;
              @try {
                  void* mgr = chatGetInst(NULL, NULL);
                  if (!mgr) return;
                  void* s = mkStr([NSString stringWithUTF8String:chatSpamText]);
                  if (s) chatSend(mgr, s, NULL);
              } @catch (...) {}
          }

          - (void)changeName {
              UIAlertController *ac = [UIAlertController alertControllerWithTitle:@"\U0001F4DB Isim Degistir" message:@"Yeni ismin:" preferredStyle:UIAlertControllerStyleAlert];
              [ac addTextFieldWithConfigurationHandler:^(UITextField *tf){ tf.placeholder = @"FEW1N"; tf.clearButtonMode = UITextFieldViewModeAlways; }];
              [ac addAction:[UIAlertAction actionWithTitle:@"Degistir" style:UIAlertActionStyleDefault handler:^(UIAlertAction *a){
                  NSString *name = ac.textFields.firstObject.text;
                  if (name.length > 0 && pn_setNickName) {
                      void* nameStr = mkStr(name);
                      if (nameStr) {
                          pn_setNickName(NULL, nameStr, NULL);
                          [self.nameBtn setTitle:[NSString stringWithFormat:@"\U0001F4DB  Isim: %@ \u2705", name] forState:UIControlStateNormal];
                          [self.nameBtn setTitleColor:C_ON forState:UIControlStateNormal];
                      }
                  }
              }]];
              [ac addAction:[UIAlertAction actionWithTitle:@"Iptal" style:UIAlertActionStyleCancel handler:nil]];
              [self presentAlert:ac];
          }

          - (void)editSpam {
              UIAlertController *ac = [UIAlertController alertControllerWithTitle:@"\U0001F4AC Spam Yazisi" message:nil preferredStyle:UIAlertControllerStyleAlert];
              [ac addTextFieldWithConfigurationHandler:^(UITextField *tf){ tf.text = [NSString stringWithUTF8String:chatSpamText]; tf.clearButtonMode = UITextFieldViewModeAlways; }];
              [ac addAction:[UIAlertAction actionWithTitle:@"Kaydet" style:UIAlertActionStyleDefault handler:^(UIAlertAction *a){
                  NSString *t = ac.textFields.firstObject.text;
                  if(t.length>0) strncpy(chatSpamText, t.UTF8String, 127);
              }]];
              [ac addAction:[UIAlertAction actionWithTitle:@"Iptal" style:UIAlertActionStyleCancel handler:nil]];
              [self presentAlert:ac];
          }

          - (void)editPlate {
              UIAlertController *ac = [UIAlertController alertControllerWithTitle:@"\U0001F522 Ozel Plaka" message:@"Plakada gorunecek yazi:" preferredStyle:UIAlertControllerStyleAlert];
              [ac addTextFieldWithConfigurationHandler:^(UITextField *tf){
                  tf.placeholder = @"FEW1N";
                  if(isCustomPlateEnabled) tf.text = [NSString stringWithUTF8String:customPlateText];
                  tf.clearButtonMode = UITextFieldViewModeAlways;
              }];
              [ac addAction:[UIAlertAction actionWithTitle:@"Uygula" style:UIAlertActionStyleDefault handler:^(UIAlertAction *a){
                  NSString *t = ac.textFields.firstObject.text;
                  if(t.length>0){ strncpy(customPlateText, t.UTF8String, 63); isCustomPlateEnabled=true; [self refreshUI]; }
              }]];
              [ac addAction:[UIAlertAction actionWithTitle:@"Kapat" style:UIAlertActionStyleDestructive handler:^(UIAlertAction *a){
                  isCustomPlateEnabled=false; [self refreshUI];
              }]];
              [self presentAlert:ac];
          }

          - (void)presentAlert:(UIAlertController*)ac {
              UIViewController *vc = [UIApplication sharedApplication].keyWindow.rootViewController;
              while (vc.presentedViewController) vc = vc.presentedViewController;
              [vc presentViewController:ac animated:YES completion:nil];
          }
          @end

          // =============================================================
          //  HOOK REGISTRATION
          // =============================================================
          static void OnImageAdded(const struct mach_header *mh, intptr_t slide) {
              const char* fname = NULL;
              Dl_info info;
              if (dladdr(mh, &info) && info.dli_fname) fname = info.dli_fname;
              else {
                  for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                      if (_dyld_get_image_header(i) == mh) { fname = _dyld_get_image_name(i); break; }
                  }
              }
              if (!fname || !strstr(fname, "UnityFramework")) return;

              uintptr_t b = (uintptr_t)mh;
              if (global_base != 0) return;
              global_base = b;

              // Function pointers
              chatGetInst    = (void*(*)(void*,void*))(b+0x319D630);
              chatSend       = (void(*)(void*,void*,void*))(b+0x319D734);
              tmp_set_text   = (void(*)(void*,void*,void*))(b+0x65D6B24);
              pn_setNickName = (void(*)(void*,void*,void*))(b+0x59161D0);

              // === ALL HOOKS ===
              // 1. Time.set_timeScale [STATIC]
              MSHookFunction((void*)(b+0x67523F8), (void*)h_setTimeScale, (void**)&o_setTimeScale);
              // 2. RCCP_CarController.Update [INSTANCE] - motor gucu + maks hiz
              MSHookFunction((void*)(b+0x59A77D8), (void*)h_rccp, (void**)&o_rccp);
              // 3. CarNitro.get_nitroAmount [INSTANCE] - sonsuz nitro
              MSHookFunction((void*)(b+0x54B3E98), (void*)h_getNitro, (void**)&o_getNitro);
              // 4-6. PlateGenerators [STATIC]
              MSHookFunction((void*)(b+0x5A12550), (void*)h_plateGen, (void**)&o_plateGen);
              MSHookFunction((void*)(b+0x5A218F4), (void*)h_genRU, (void**)&o_genRU);
              MSHookFunction((void*)(b+0x5A22100), (void*)h_genUS, (void**)&o_genUS);
              MSHookFunction((void*)(b+0x5A22ADC), (void*)h_genEU, (void**)&o_genEU);
              // 7. PlateTuner.get_plateText [INSTANCE]
              MSHookFunction((void*)(b+0x5F85AEC), (void*)h_plateText, (void**)&o_plateText);
              // 8. ChatManager.Send [INSTANCE]
              MSHookFunction((void*)(b+0x319D734), (void*)h_chatSend, (void**)&o_chatSend);
              // 9. HR_UI_RoomListLine.Connect [INSTANCE]
              MSHookFunction((void*)(b+0x5497790), (void*)h_roomConnect, (void**)&o_roomConnect);
              // 10. HR_PhotonLobbyManager.EnterPassword [INSTANCE]
              MSHookFunction((void*)(b+0x548C5CC), (void*)h_enterPwd, (void**)&o_enterPwd);
          }

          %ctor {
              _dyld_register_func_for_add_image(OnImageAdded);
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5*NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [[FEW1NMenu shared] build];
              });
          }
          TWEAKEOF

      - name: Build Tweak (Dylib/Deb)
        run: |
          export THEOS=~/theos
          make package clean
          make package FINALPACKAGE=1
          find packages -name "*.deb" -exec mv {} packages/FEW1NMod_17.0_${{ github.run_number }}.deb \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FEW1N-ModMenu-Tweak-v17-${{ github.run_number }}
          path: packages/FEW1NMod_17.0_${{ github.run_number }}.deb
